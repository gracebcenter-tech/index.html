<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const VER="4.0.0";
const KEY="alodo_v4";
const CODES={patron:"1234",special:"alodo2025"};
const CASE_COLORS=["#27AE60","#2471A3","#C9A84C","#C0392B","#7D3C98"];
const PAYS=[
  {nom:"Togo",code:"+228",len:8},{nom:"Bénin",code:"+229",len:8},
  {nom:"Ghana",code:"+233",len:9},{nom:"Côte d'Ivoire",code:"+225",len:10},
  {nom:"Sénégal",code:"+221",len:9},{nom:"Cameroun",code:"+237",len:9},
  {nom:"Mali",code:"+223",len:8},{nom:"Burkina Faso",code:"+226",len:8},
  {nom:"Niger",code:"+227",len:8},{nom:"France",code:"+33",len:9},
  {nom:"Autre",code:"+",len:8},
];
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const C={
  bg:"#F5F0EA",surface:"#FFFFFF",card:"#FDFAF7",border:"#E5DDD4",
  primary:"#1B4332",primaryL:"#2D6A4F",accent:"#E76F27",
  gold:"#C9A84C",red:"#C0392B",green:"#27AE60",blue:"#2471A3",purple:"#7D3C98",
  text:"#1A1A2E",textM:"#4A4A6A",textL:"#8A8AA0",shadow:"rgba(27,67,50,0.08)",
};

// ═══════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════
const fmt=n=>Number(n||0).toLocaleString("fr-FR")+" F";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtDate=(d=new Date())=>{
  const dt=d instanceof Date?d:new Date(d);
  if(isNaN(dt.getTime()))return"—";
  return`${JOURS[dt.getDay()]} ${String(dt.getDate()).padStart(2,"0")} ${MOIS[dt.getMonth()]} ${dt.getFullYear()} à ${String(dt.getHours()).padStart(2,"0")}h${String(dt.getMinutes()).padStart(2,"0")}min`;
};
const isoNow=()=>new Date().toISOString();
const isoDate=()=>new Date().toISOString().slice(0,10);

const getNumSeq=(clients,clientId)=>{
  const sorted=[...clients].sort((a,b)=>(a.dateInscription||"").localeCompare(b.dateInscription||""));
  const idx=sorted.findIndex(c=>c.id===clientId);
  return String(idx+1).padStart(2,"0");
};
const getNumEpargne=(clients,clientId,nbCarnets)=>{
  const n=getNumSeq(clients,clientId);
  return nbCarnets===0?`${n}E`:`${n}E${nbCarnets+1}`;
};
const getNumCarteM=(clients,clientId,cartes)=>{
  const n=getNumSeq(clients,clientId);
  const nb=cartes.filter(c=>c.clientId===clientId&&c.numero).length;
  return`${n}M${nb+1}`;
};
const getNumCarnetA=(clients,clientId,carnets)=>{
  const n=getNumSeq(clients,clientId);
  const nb=carnets.filter(c=>c.clientId===clientId&&c.numero).length;
  return`${n}A${nb+1}`;
};

// Calcul dette totale client (Carte M + Crédit uniquement)
const calcDetteTotale=(clientId,cartes,credits)=>{
  const avances=cartes.filter(c=>c.clientId===clientId&&c.avTotale?.actif)
    .reduce((s,c)=>s+calcDetteAvance(c),0);
  const creds=credits.filter(c=>c.clientId===clientId&&c.statut==="actif")
    .reduce((s,c)=>s+(c.restant||0),0);
  return avances+creds;
};

const calcDetteAvance=(carte)=>{
  if(!carte?.avTotale?.actif)return 0;
  // Dette = Avance totale + Avances partielles - Cotisations hors commission - Remboursements + Pénalités
  const cotHorsComm=Math.max(0,(carte.cotisations||[]).reduce((s,c)=>s+c.montant,0)-(carte.commission||0));
  const totalAvP=(carte.avPartielles||[]).reduce((s,a)=>s+a.montant,0);
  return Math.max(0,(carte.avTotale.montant||0)+totalAvP-cotHorsComm-(carte.avTotale.rembourse||0)+(carte.avTotale.penalite||0));
};

const initData=()=>({
  clients:[],cartes:[],carnets:[],carnetsEpargne:[],credits:[],
  revenus:{commissions:[],ventes:[],penalites:[],mm:[],monnaie:[]},
  audit:[],caisse:[],
});

// ═══════════════════════════════════
// STOCKAGE ROBUSTE
// ═══════════════════════════════════
// Compression photo avant sauvegarde
const compressPhoto=(dataUrl,maxW=200,quality=0.6)=>{
  return new Promise(resolve=>{
    if(!dataUrl||!dataUrl.startsWith("data:image")){resolve(dataUrl);return;}
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL("image/jpeg",quality));
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
};

// Sauvegarde sans photos (photos séparées)
const saveData=(data)=>{
  try{
    // Sauvegarder les données sans photos
    const dataWithoutPhotos={...data,clients:data.clients.map(c=>({...c,photo:null}))};
    const json=JSON.stringify(dataWithoutPhotos);
    localStorage.setItem(KEY,json);
    // Sauvegarder les photos séparément
    data.clients.forEach(c=>{
      if(c.photo)try{localStorage.setItem(KEY+"_photo_"+c.id,c.photo);}catch(e){}
    });
  }catch(e){
    // Si localStorage plein, sauvegarder sans photos
    try{
      const minimal={...data,clients:data.clients.map(c=>({...c,photo:null}))};
      localStorage.setItem(KEY,JSON.stringify(minimal));
    }catch(e2){console.error("Sauvegarde impossible:",e2);}
  }
};

const loadData=()=>{
  try{
    const s=localStorage.getItem(KEY);
    if(!s)return initData();
    const d=JSON.parse(s);
    const base={...initData(),...d};
    // Recharger les photos séparément
    base.clients=base.clients.map(c=>{
      const photo=localStorage.getItem(KEY+"_photo_"+c.id);
      return photo?{...c,photo}:c;
    });
    // Migration : ancien système épargne (client.soldeEpargne/numEpargne/transactions) → carnetsEpargne
    base.clients.forEach(c=>{
      const aDejaCarnet=(base.carnetsEpargne||[]).some(ce=>ce.clientId===c.id);
      if(!aDejaCarnet&&((c.soldeEpargne||0)>0||(c.transactions||[]).length>0||c.numEpargne)){
        base.carnetsEpargne=[...(base.carnetsEpargne||[]),{
          id:uid(),clientId:c.id,statut:"actif",dateCreation:c.dateInscription||isoNow(),
          numero:c.numEpargne||null,prixVente:0,typeVente:"normal",
          dateDebut:c.numEpargne?(c.transactions?.[0]?.date||isoNow()):null,
          soldeEpargne:c.soldeEpargne||0,transactions:c.transactions||[],
        }];
      }
    });
    return base;
  }catch{return initData();}
};

function useData(){
  const[data,setData]=useState(()=>loadData());

  useEffect(()=>{saveData(data);},[data]);

  const up=useCallback(fn=>setData(d=>{
    const nd=fn(JSON.parse(JSON.stringify(d)));
    return nd;
  }),[]);

  return[data,up];
}

// Journal audit
const addAudit=(up,action,details,auteur="Patron")=>{
  up(d=>{
    d.audit=[...( d.audit||[]),{id:uid(),date:isoNow(),auteur,action,details}];
    return d;
  });
};

// ═══════════════════════════════════
// UI BASE
// ═══════════════════════════════════
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
  const bg={success:C.green,error:C.red,warn:C.accent,info:C.blue}[type]||C.green;
  return<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"11px 24px",borderRadius:14,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 24px rgba(0,0,0,0.25)",maxWidth:"92vw",textAlign:"center",animation:"fadeIn .2s ease",lineHeight:1.5}}>{msg}</div>;
}

function Modal({title,onClose,children}){
  return<div style={{position:"fixed",inset:0,zIndex:600,background:"rgba(10,30,20,0.45)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:24,borderTop:`1px solid ${C.border}`,maxHeight:"90vh",overflowY:"auto",animation:"slideUp .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:C.primary}}>{title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textL,padding:4}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function Inp({label,unit,error,hint,...p}){
  return<div style={{marginBottom:13}}>
    {label&&<div style={{fontSize:11,color:C.textM,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>}
    <div style={{position:"relative"}}>
      <input {...p} style={{width:"100%",background:C.card,border:`1.5px solid ${error?C.red:C.border}`,borderRadius:10,padding:unit?"11px 50px 11px 14px":"11px 14px",color:C.text,fontSize:15,outline:"none",...p.style}}/>
      {unit&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:C.textL,fontSize:12}}>{unit}</span>}
    </div>
    {error&&<div style={{color:C.red,fontSize:11,marginTop:3}}>{error}</div>}
    {hint&&!error&&<div style={{color:C.textL,fontSize:11,marginTop:3}}>{hint}</div>}
  </div>;
}

function Sel({label,children,...p}){
  return<div style={{marginBottom:13}}>
    {label&&<div style={{fontSize:11,color:C.textM,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>}
    <select {...p} style={{width:"100%",background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"11px 14px",color:p.value?C.text:C.textL,fontSize:15,outline:"none",...p.style}}>{children}</select>
  </div>;
}

function Btn({children,onClick,v="pri",s={},disabled,full=true}){
  const vs={
    pri:{background:C.primary,color:"#fff",border:"none"},
    acc:{background:C.accent,color:"#fff",border:"none"},
    ghost:{background:"transparent",color:C.primary,border:`1.5px solid ${C.primary}`},
    dan:{background:C.red,color:"#fff",border:"none"},
    gold:{background:C.gold,color:"#fff",border:"none"},
    green:{background:C.green,color:"#fff",border:"none"},

function Card({children,s={},onClick}){
  return<div onClick={onClick} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:14,boxShadow:`0 2px 12px ${C.shadow}`,cursor:onClick?"pointer":"default",...s}}>{children}</div>;

  return<span style={{background:color+"22",color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{label}</span>;

function ST({children}){

function HR(){return<div style={{height:1,background:C.border,margin:"12px 0"}}/>;}

function Row({label,value,color,bold}){

    <div style={{fontSize:12,color:C.textM,flexShrink:0}}>{label}</div>
    <div style={{fontWeight:bold?700:600,fontSize:13,color:color||C.text,textAlign:"right"}}>{value}</div>

function PT({children,s={}}){
  return<div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.primary,marginBottom:16,...s}}>{children}</div>;
}

function AlertBox({msg,type="warn"}){
  const colors={warn:{bg:C.accent+"15",border:C.accent+"50",text:C.accent},error:{bg:C.red+"15",border:C.red+"50",text:C.red},info:{bg:C.blue+"15",border:C.blue+"50",text:C.blue},success:{bg:C.green+"15",border:C.green+"50",text:C.green}};
  const c=colors[type]||colors.warn;
  return<div style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:c.text,fontWeight:500,lineHeight:1.5}}>{msg}</div>;
}

// Grille 31 cases colorées
function Grille31({cotisations,mise}){
  if(!mise||!cotisations?.length)return<div style={{background:C.card,borderRadius:10,padding:10,marginBottom:12,textAlign:"center",fontSize:12,color:C.textL}}>Pas encore de cases cochées</div>;
  
  // Construire tableau de couleurs par case
  const caseColors=new Array(31).fill(null);
  let caseIdx=0;
  cotisations.filter(c=>c.montant>0).forEach((cot,ci)=>{
    const nb=Math.round(cot.montant/mise);
    const color=CASE_COLORS[ci%CASE_COLORS.length];
    for(let i=0;i<nb&&caseIdx<31;i++){caseColors[caseIdx]=color;caseIdx++;}
  });

  return<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:12}}>
    {Array.from({length:31},(_,i)=>(
      <div key={i} style={{aspectRatio:"1",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,background:caseColors[i]||C.border,color:caseColors[i]?"#fff":C.textL}}>
        {i+1}
      </div>
    ))}
  </div>;
}

// Modal mot de passe spécial
function MdpModal({msg,onOk,onClose,avecMotif}){
  const[v,setV]=useState("");
  const[motif,setMotif]=useState("");
  const[err,setErr]=useState("");
  const go=()=>{
    if(avecMotif&&!motif.trim()){setErr("Le motif est obligatoire");return;}
    if(v===CODES.special){onOk(motif);onClose();}
    else{setErr("Code incorrect");setV("");}
  };
  return<Modal title="🔒 Autorisation requise" onClose={onClose}>
    <AlertBox msg={msg} type="warn"/>
    {avecMotif&&<Inp label="Motif (obligatoire)" value={motif} onChange={e=>setMotif(e.target.value)} placeholder="ex: Erreur de saisie, doublon..."/>}
    <Inp label="Code spécial" type="password" placeholder="••••••••" value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/>
    {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{err}</div>}
    <Btn onClick={go}>Confirmer</Btn>
    <Btn v="ghost" onClick={onClose}>Annuler</Btn>
  </Modal>;
}

// Modal générique de modification (montant, date, note) pour une opération déjà enregistrée
function EditOpModal({titre,montant,date,note,onSave,onClose,avecNote=true}){
  const toLocalInput=d=>{
    const dt=d?new Date(d):new Date();
    const pad=n=>String(n).padStart(2,"0");
    return`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  };
  const[mt,setMt]=useState(String(montant??""));
  const[dt,setDt]=useState(toLocalInput(date));
  const[nt,setNt]=useState(note||"");
  const[motif,setMotif]=useState("");
  const[code,setCode]=useState("");
  const[err,setErr]=useState("");
  const go=()=>{
    const m=parseInt(mt);
    if(!m||m<=0){setErr("Montant invalide");return;}
    if(!motif.trim()){setErr("Le motif est obligatoire");return;}
    if(code!==CODES.special){setErr("Code spécial incorrect");setCode("");return;}
    onSave({montant:m,date:new Date(dt).toISOString(),note:nt,motif});
    onClose();
  };
  return<Modal title={`✏️ Modifier — ${titre}`} onClose={onClose}>
    <Inp label="Montant (F) *" type="number" inputMode="numeric" value={mt} onChange={e=>setMt(e.target.value)} placeholder="0"/>
    <Inp label="Date et heure" type="datetime-local" value={dt} onChange={e=>setDt(e.target.value)}/>
    {avecNote&&<Inp label="Note (optionnel)" value={nt} onChange={e=>setNt(e.target.value)} placeholder="..."/>}
    <Inp label="Motif de la modification (obligatoire)" value={motif} onChange={e=>setMotif(e.target.value)} placeholder="ex: Erreur de saisie..."/>

// Photo client
function PhotoClient({photo,onPhoto,onDelete,editable=true}){
  const refCamera=useRef();
  const refGallery=useRef();

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const compressed=await compressPhoto(ev.target.result,200,0.6);
      onPhoto(compressed);
    };
    reader.readAsDataURL(file);
  };

  return<div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:16}}>
    <div style={{position:"relative",width:90,height:90}}>
      {photo?<img src={photo} style={{width:90,height:90,borderRadius:"50%",objectFit:"cover",border:`3px solid ${C.primary}`}} alt=""/>

    </div>
    {editable&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",justifyContent:"center"}}>

        🖼️ Galerie
      </button>

// Sélecteur client
function ClientSelector({data,onSelect,onNew}){
  const[search,setSearch]=useState("");
  const getNumE=cid=>(data.carnetsEpargne||[]).filter(x=>x.clientId===cid).map(x=>x.numero).filter(Boolean);
  const results=useMemo(()=>{
    if(!search.trim())return data.clients.slice(0,8);
    const q=search.toLowerCase();
    return data.clients.filter(c=>[c.nom,c.prenom,c.surnom,
      ...(c.telephones||[]).map(t=>t.numero),
      ...(data.cartes||[]).filter(x=>x.clientId===c.id).map(x=>x.numero).filter(Boolean),
      ...(data.carnets||[]).filter(x=>x.clientId===c.id).map(x=>x.numero).filter(Boolean),
      ...getNumE(c.id),
      c.avaliseur1?.nom,c.avaliseur2?.nom,
    ].some(v=>v&&v.toLowerCase().includes(q))).slice(0,10);
  },[search,data]);
  return<div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Nom, prénom, téléphone, numéro, avaliseur..."
      style={{width:"100%",background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"11px 14px",fontSize:14,outline:"none",marginBottom:10}}/>
    {results.map(c=>{

      return<div key={c.id} onClick={()=>onSelect(c)} style={{background:C.card,border:`1px solid ${dette>0?C.red+"50":C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>

          <div style={{fontWeight:600,fontSize:13}}>{c.nom} {c.prenom}</div>
          <div style={{fontSize:11,color:C.textL}}>{numEs[0]||""}{(c.telephones||[])[0]?` · ${c.telephones[0].numero}`:""}</div>

// FORMULAIRE CLIENT
// ═══════════════════════════════════
function FormulaireClient({data,up,onSave,onCancel,toast,clientExistant}){
  const init=clientExistant?{
    nom:clientExistant.nom||"",prenom:clientExistant.prenom||"",surnom:clientExistant.surnom||"",
    profession:clientExistant.profession||"",adresse:clientExistant.adresse||"",lieuActivite:clientExistant.lieuActivite||"",
    photo:clientExistant.photo||null,
    pays0:clientExistant.telephones?.[0]?PAYS.find(p=>p.code===clientExistant.telephones[0].code)||PAYS[0]:PAYS[0],
    tel0:clientExistant.telephones?.[0]?.local||"",
    pays1:clientExistant.telephones?.[1]?PAYS.find(p=>p.code===clientExistant.telephones[1].code)||PAYS[0]:PAYS[0],
    tel1:clientExistant.telephones?.[1]?.local||"",
    pays2:clientExistant.telephones?.[2]?PAYS.find(p=>p.code===clientExistant.telephones[2].code)||PAYS[0]:PAYS[0],
    tel2:clientExistant.telephones?.[2]?.local||"",
    av1Nom:clientExistant.avaliseur1?.nom||"",av1Prenom:clientExistant.avaliseur1?.prenom||"",
    av1Pays:clientExistant.avaliseur1?.pays?PAYS.find(p=>p.code===clientExistant.avaliseur1.code)||PAYS[0]:PAYS[0],
    av1Tel:clientExistant.avaliseur1?.local||"",av1Prof:clientExistant.avaliseur1?.profession||"",
    av1Adr:clientExistant.avaliseur1?.adresse||"",av1Act:clientExistant.avaliseur1?.lieuActivite||"",
    av2Nom:clientExistant.avaliseur2?.nom||"",av2Prenom:clientExistant.avaliseur2?.prenom||"",
    av2Pays:clientExistant.avaliseur2?.pays?PAYS.find(p=>p.code===clientExistant.avaliseur2.code)||PAYS[0]:PAYS[0],
    av2Tel:clientExistant.avaliseur2?.local||"",av2Prof:clientExistant.avaliseur2?.profession||"",
    av2Adr:clientExistant.avaliseur2?.adresse||"",av2Act:clientExistant.avaliseur2?.lieuActivite||"",
  }:{pays0:PAYS[0],pays1:PAYS[0],pays2:PAYS[0],av1Pays:PAYS[0],av2Pays:PAYS[0]};

  const[form,setForm]=useState(init);
  const[errors,setErrors]=useState({});
  const[showAv1,setShowAv1]=useState(!!(clientExistant?.avaliseur1?.nom));
  const[showAv2,setShowAv2]=useState(!!(clientExistant?.avaliseur2?.nom));
  const estModif=!!clientExistant;

  const valTel=(num,pays)=>{if(!num)return true;const c=num.replace(/\s/g,"");return c.length===pays.len&&/^\d+$/.test(c);};

  const save=()=>{
    const errs={};
    if(!form.nom?.trim())errs.nom="Obligatoire";
    if(!form.prenom?.trim())errs.prenom="Obligatoire";
    if(!form.tel0?.trim())errs.tel0="Au moins un numéro obligatoire";
    else if(!valTel(form.tel0,form.pays0||PAYS[0]))errs.tel0=`Invalide (${(form.pays0||PAYS[0]).len} chiffres)`;
    if(form.tel1&&!valTel(form.tel1,form.pays1||PAYS[0]))errs.tel1=`Invalide (${(form.pays1||PAYS[0]).len} chiffres)`;
    if(form.tel2&&!valTel(form.tel2,form.pays2||PAYS[0]))errs.tel2=`Invalide (${(form.pays2||PAYS[0]).len} chiffres)`;
    if(!estModif&&form.tel0){
      const t=(form.pays0||PAYS[0]).code+form.tel0.replace(/\s/g,"");
      if(data.clients.some(c=>c.id!==clientExistant?.id&&c.telephones?.some(x=>x.numero===t)))errs.tel0="Numéro déjà enregistré";
    }
    if(Object.keys(errs).length){setErrors(errs);return;}

    const mkTels=()=>{const t=[];
      if(form.tel0){const p=form.pays0||PAYS[0];t.push({pays:p.nom,code:p.code,numero:p.code+form.tel0.replace(/\s/g,""),local:form.tel0});}
      if(form.tel1){const p=form.pays1||PAYS[0];t.push({pays:p.nom,code:p.code,numero:p.code+form.tel1.replace(/\s/g,""),local:form.tel1});}
      if(form.tel2){const p=form.pays2||PAYS[0];t.push({pays:p.nom,code:p.code,numero:p.code+form.tel2.replace(/\s/g,""),local:form.tel2});}
      return t;};

    const mkAv=(pref)=>form[`${pref}Nom`]?{
      nom:form[`${pref}Nom`],prenom:form[`${pref}Prenom`]||"",
      pays:(form[`${pref}Pays`]||PAYS[0]).nom,code:(form[`${pref}Pays`]||PAYS[0]).code,
      numero:(form[`${pref}Pays`]||PAYS[0]).code+(form[`${pref}Tel`]||"").replace(/\s/g,""),
      local:form[`${pref}Tel`]||"",
      profession:form[`${pref}Prof`]||"",adresse:form[`${pref}Adr`]||"",lieuActivite:form[`${pref}Act`]||"",
    }:null;

    if(estModif){
      up(d=>{
        const i=d.clients.findIndex(c=>c.id===clientExistant.id);
        d.clients[i]={...d.clients[i],nom:form.nom.trim().toUpperCase(),prenom:form.prenom.trim(),
          surnom:form.surnom||"",telephones:mkTels(),profession:form.profession||"",
          adresse:form.adresse||"",lieuActivite:form.lieuActivite||"",
          avaliseur1:mkAv("av1"),avaliseur2:mkAv("av2"),photo:form.photo||null};
        return d;
      });
      toast("Profil mis à jour !");onSave(clientExistant);
    }else{
      const n={id:uid(),nom:form.nom.trim().toUpperCase(),prenom:form.prenom.trim(),
        surnom:form.surnom||"",telephones:mkTels(),profession:form.profession||"",
        adresse:form.adresse||"",lieuActivite:form.lieuActivite||"",
        avaliseur1:mkAv("av1"),avaliseur2:mkAv("av2"),photo:form.photo||null,
        dateInscription:isoNow()};
      up(d=>{d.clients=[...d.clients,n];return d;});
      toast("Client enregistré !");onSave(n);
    }
  };

  return<div>
    <PhotoClient photo={form.photo||null} onPhoto={p=>setForm(f=>({...f,photo:p}))} onDelete={()=>setForm(f=>({...f,photo:null}))}/>
    <Inp label="Nom *" value={form.nom||""} onChange={e=>setForm(f=>({...f,nom:e.target.value.toUpperCase()}))} placeholder="NOM" error={errors.nom}/>
    <Inp label="Prénom *" value={form.prenom||""} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))} placeholder="Prénom" error={errors.prenom}/>
    <Inp label="Surnom" value={form.surnom||""} onChange={e=>setForm(f=>({...f,surnom:e.target.value}))} placeholder="Surnom"/>
    <TelField idx={0} form={form} setForm={setForm} errors={errors}/>
    <TelField idx={1} form={form} setForm={setForm} errors={errors}/>
    <TelField idx={2} form={form} setForm={setForm} errors={errors}/>
    <Inp label="Profession" value={form.profession||""} onChange={e=>setForm(f=>({...f,profession:e.target.value}))} placeholder="ex: Commerçant"/>
    <Inp label="Résidence" value={form.adresse||""} onChange={e=>setForm(f=>({...f,adresse:e.target.value}))} placeholder="Quartier, ville..."/>
    <Inp label="Lieu d'activité" value={form.lieuActivite||""} onChange={e=>setForm(f=>({...f,lieuActivite:e.target.value}))} placeholder="Marché, bureau..."/>
    <HR/>
    <button onClick={()=>setShowAv1(!showAv1)} style={{background:C.primary+"15",color:C.primary,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",marginBottom:8,textAlign:"left"}}>
      {showAv1?"▼":"▶"} Avaliseur 1 {form.av1Nom?"("+form.av1Nom+")":"(optionnel)"}
    </button>
    {showAv1&&<AvaliseurForm prefix="av1" form={form} setForm={setForm} errors={errors}/>}
    <button onClick={()=>setShowAv2(!showAv2)} style={{background:C.primary+"15",color:C.primary,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",marginBottom:8,textAlign:"left"}}>
      {showAv2?"▼":"▶"} Avaliseur 2 {form.av2Nom?"("+form.av2Nom+")":"(optionnel)"}
    </button>
    {showAv2&&<AvaliseurForm prefix="av2" form={form} setForm={setForm} errors={errors}/>}
    <HR/>
    <Btn onClick={save}>{estModif?"Enregistrer les modifications":"Enregistrer le client"}</Btn>
    <Btn v="ghost" onClick={onCancel}>Annuler</Btn>
  </div>;
}

function Dashboard({data,setTab,setNavExtra,role}){
  const totalEp=(data.carnetsEpargne||[]).reduce((s,c)=>s+(c.soldeEpargne||0),0);
  const crsActifs=data.credits.filter(c=>c.statut==="actif");
  const totalCr=crsActifs.reduce((s,c)=>s+(c.restant||0),0);
  const totalAvances=data.cartes.filter(c=>c.avTotale?.actif).reduce((s,c)=>s+calcDetteAvance(c),0);
  const nbCM=data.cartes.filter(c=>c.statut==="actif").length;
  const nbCA=data.carnets.filter(c=>c.statut==="actif").length;
  const today=isoDate();
  const rev=data.revenus;
  const filtrAuj=arr=>(arr||[]).filter(o=>o.date?.slice(0,10)===today).reduce((s,o)=>s+(o.montant||0),0);
  const totalRevAuj=["commissions","ventes","penalites","mm","monnaie"].reduce((s,k)=>s+filtrAuj(rev[k]),0);
  const clientsDebiteurs=[...new Set([
    ...data.cartes.filter(c=>c.avTotale?.actif).map(c=>c.clientId),
    ...crsActifs.map(c=>c.clientId),
  ])].length;

  const alertes=[];
  crsActifs.forEach(cr=>{
    const cli=data.clients.find(c=>c.id===cr.clientId);
    if(cr.echeance&&new Date(cr.echeance)<new Date())
      alertes.push({type:"error",msg:`Crédit échu : ${cli?.nom||""} ${cli?.prenom||""} — ${fmt(cr.restant)}`});
  });
  data.cartes.forEach(c=>{
    if(c.avTotale?.actif&&c.avTotale.debut){
      const j=Math.floor((Date.now()-new Date(c.avTotale.debut))/86400000);
      if(j>30){const cli=data.clients.find(x=>x.id===c.clientId);
        alertes.push({type:"warn",msg:`Avance totale en retard : ${cli?.nom||""} (${c.numero||"carte"}) — ${fmt(calcDetteAvance(c))}`});}
    }
    if(c.statut==="actif"&&c.dateDebut&&!c.avTotale?.actif){
      const j=Math.floor((Date.now()-new Date(c.dateDebut))/86400000);
      if(j>30){const cli=data.clients.find(x=>x.id===c.clientId);
        alertes.push({type:"warn",msg:`Carte M non soldée depuis +1 mois : ${cli?.nom||""} (${c.numero||"carte"})`});}
    }
  });

  const SC=({icon,label,value,color,onClick,sub})=>(
    <div onClick={onClick} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:14,boxShadow:`0 2px 8px ${C.shadow}`,cursor:onClick?"pointer":"default"}}>
      <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:10,color:C.textL,marginBottom:3,lineHeight:1.3}}>{label}</div>
      <div style={{fontWeight:800,fontSize:15,color:color||C.primary,fontFamily:"'Playfair Display',serif"}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.textL,marginTop:2}}>{sub}</div>}
    </div>
  );

  return<div style={{padding:"16px 14px 80px"}}>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:11,color:C.textL,letterSpacing:"0.1em",textTransform:"uppercase"}}>Bienvenue 👋</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:800,color:C.primary}}>Tableau de bord</div>
      <div style={{fontSize:12,color:C.textM}}>{fmtDate()}</div>
    </div>
    {alertes.length>0&&<div style={{marginBottom:16}}>
      <ST>⚠ Alertes ({alertes.length})</ST>
      {alertes.map((a,i)=><AlertBox key={i} msg={a.msg} type={a.type}/>)}
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <SC icon="👥" label="Total clients" value={data.clients.length} color={C.primary} onClick={()=>setTab("clients")}/>
      <SC icon="🔴" label="Clients débiteurs" value={clientsDebiteurs} color={C.red} onClick={()=>setTab("clients")}/>
      <SC icon="🏦" label="Total épargnes" value={fmt(totalEp)} color={C.blue} onClick={()=>setTab("clients")}/>
      <SC icon="🗓" label="Cartes M actives" value={nbCM} color={C.primaryL} onClick={()=>setTab("tontine")}/>
      <SC icon="📓" label="Carnets A actifs" value={nbCA} color={C.gold} onClick={()=>setTab("tontine")}/>
      <SC icon="💳" label="Crédits en cours" value={fmt(totalCr)} color={C.accent} onClick={()=>setTab("credit")}/>
      <SC icon="📊" label="Avances Carte M" value={fmt(totalAvances)} color={C.purple} onClick={()=>setTab("tontine")}/>
      {role==="patron"&&<SC icon="💰" label="Revenus aujourd'hui" value={fmt(totalRevAuj)} color={C.green} onClick={()=>setTab("revenus")}/>}
    </div>
    <ST>Derniers clients</ST>
    {data.clients.slice(-5).reverse().map(cli=>{
      const dette=calcDetteTotale(cli.id,data.cartes,data.credits);
      const soldeE=(data.carnetsEpargne||[]).filter(c=>c.clientId===cli.id).reduce((s,c)=>s+(c.soldeEpargne||0),0);
      return<div key={cli.id} onClick={()=>{setNavExtra({clientId:cli.id});setTab("clients");}}
        style={{background:C.surface,border:`1px solid ${dette>0?C.red+"50":C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        {cli.photo?<img src={cli.photo} style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt=""/>
          :<div style={{width:40,height:40,borderRadius:"50%",background:C.primary+"20",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:C.primary,fontSize:12,flexShrink:0}}>{(cli.nom||"?")[0]}{(cli.prenom||"")[0]}</div>}
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:14}}>{cli.nom} {cli.prenom}</div>
          <div style={{fontSize:11,color:C.textL}}>{(cli.telephones||[])[0]?.numero||""}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontWeight:700,color:C.primary,fontSize:13}}>{fmt(soldeE)}</div>
          {dette>0&&<div style={{fontSize:11,color:C.red,fontWeight:600}}>🔴 {fmt(dette)}</div>}
        </div>
      </div>;
    })}
    {data.clients.length===0&&<div style={{textAlign:"center",color:C.textL,padding:30,fontSize:14}}>Aucun client enregistré</div>}
  </div>;
}

// ═══════════════════════════════════
// MODULE CLIENTS + ÉPARGNE
// ═══════════════════════════════════
function Clients({data,up,toast,navExtra,setNavExtra}){
  const[vue,setVue]=useState("liste");
  const[selId,setSelId]=useState(null);
  const[selCarnetEId,setSelCarnetEId]=useState(null);
  const[mdp,setMdp]=useState(null);
  const[editOp,setEditOp]=useState(null);
  const[form,setForm]=useState({});
  const[search,setSearch]=useState("");
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{
    if(navExtra?.clientId){
      setSelId(navExtra.clientId);
      if(navExtra.openCarnetE){
        setSelCarnetEId(navExtra.openCarnetE);setForm({});
        setVue(navExtra.carnetEAction||"detail");
      }else{
        setVue("detail");
      }
      setNavExtra(null);
    }
  },[navExtra]);
  const getCli=()=>data.clients.find(c=>c.id===selId);
  const getCarnetE=()=>data.carnetsEpargne.find(c=>c.id===selCarnetEId);

  // Vérification avant retrait épargne
  const demandeRetrait=()=>{
    const carnetE=getCarnetE();const mt=parseInt(form.montant);
    if(!mt||mt<=0)return toast("Montant invalide","error");
    if(mt>(carnetE?.soldeEpargne||0))return toast("Solde insuffisant","error");
    const dette=calcDetteTotale(selId,data.cartes,data.credits);
    const soldeApres=(carnetE?.soldeEpargne||0)-mt;
    // Code spécial toujours requis pour retrait
    if(dette>0&&soldeApres<dette){
      // Solde après retrait < dette : afficher options
      setMdp({msg:`⚠ Solde après retrait (${fmt(soldeApres)}) < Dette (${fmt(dette)})\n\nOptions disponibles :\n1. Déduire la dette automatiquement\n2. Retrait forcé (dette reste en rouge)`,
        onOk:(motif)=>doRetrait(mt,motif)});
    }else{
      // Retrait libre mais code spécial quand même
      setMdp({msg:`Retrait de ${fmt(mt)} — Code spécial requis.`,onOk:(motif)=>doRetrait(mt,motif)});
    }
  };

  const doRetrait=(mt,motif)=>{
    up(d=>{
      const i=d.carnetsEpargne.findIndex(c=>c.id===selCarnetEId);
      d.carnetsEpargne[i].soldeEpargne-=mt;
      d.carnetsEpargne[i].transactions=[...(d.carnetsEpargne[i].transactions||[]),
        {id:uid(),type:"retrait",montant:mt,date:isoNow(),retraitant:form.retraitant||"Titulaire",note:form.note||"",motif:motif||""}];
      const cli=d.clients.find(c=>c.id===selId);
      d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Retrait épargne",details:`${fmt(mt)} — Client: ${cli?.nom||""}`,motif:motif||""}];
      return d;
    });
    toast("Retrait de "+fmt(mt)+" effectué");setForm({});setVue("detail");
  };

  const saveDepot=()=>{
    const mt=parseInt(form.montant);
    if(!mt||mt<=0)return toast("Montant invalide","error");
    up(d=>{
      const i=d.carnetsEpargne.findIndex(c=>c.id===selCarnetEId);
      if(!d.carnetsEpargne[i].numero){
        const nb=d.carnetsEpargne.filter(c=>c.clientId===selId&&c.numero).length;
        d.carnetsEpargne[i].numero=getNumEpargne(d.clients,selId,nb);
        d.carnetsEpargne[i].dateDebut=isoNow();
      }
      d.carnetsEpargne[i].soldeEpargne=(d.carnetsEpargne[i].soldeEpargne||0)+mt;
      d.carnetsEpargne[i].transactions=[...(d.carnetsEpargne[i].transactions||[]),
        {id:uid(),type:"depot",montant:mt,date:isoNow(),note:form.note||""}];
      return d;
    });
    toast("Dépôt de "+fmt(mt)+" enregistré");setForm({});setVue("detail");
  };

  const delTx=(txId)=>{
    setMdp({msg:"Supprimer cette transaction ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const i=d.carnetsEpargne.findIndex(c=>c.id===selCarnetEId);
        const tx=d.carnetsEpargne[i].transactions.find(t=>t.id===txId);
        if(tx){
          if(tx.type==="depot")d.carnetsEpargne[i].soldeEpargne-=tx.montant;
          else d.carnetsEpargne[i].soldeEpargne+=tx.montant;
          d.carnetsEpargne[i].transactions=d.carnetsEpargne[i].transactions.filter(t=>t.id!==txId);
          d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression transaction épargne",details:`${tx.type} ${fmt(tx.montant)}`,motif}];
        }
        return d;
      });
      toast("Transaction supprimée");
    }});
  };

  const saveEditTx=({montant,date,motif})=>{
    up(d=>{
      const i=d.carnetsEpargne.findIndex(c=>c.id===selCarnetEId);
      const ti=d.carnetsEpargne[i].transactions.findIndex(t=>t.id===editOp.id);
      if(ti===-1)return d;
      const tx=d.carnetsEpargne[i].transactions[ti];
      const ancien=tx.montant;
      // Annuler l'ancien impact sur le solde, puis appliquer le nouveau montant
      if(tx.type==="depot")d.carnetsEpargne[i].soldeEpargne-=ancien;
      else d.carnetsEpargne[i].soldeEpargne+=ancien;
      tx.montant=montant;tx.date=date;
      if(tx.type==="depot")d.carnetsEpargne[i].soldeEpargne+=montant;
      else d.carnetsEpargne[i].soldeEpargne-=montant;
      d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Modification transaction épargne",details:`${tx.type} ${fmt(ancien)} → ${fmt(montant)}`,motif}];
      return d;
    });
    toast("Transaction modifiée");
  };

  const supprimerCarnetEpargne=(carnetEId)=>{
    setMdp({msg:"Annuler entièrement cet achat de Carnet Épargne ? Tous les dépôts/retraits enregistrés seront perdus.",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const carnetE=d.carnetsEpargne.find(c=>c.id===carnetEId);
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression vente Carnet Épargne",details:carnetE?.numero||"",motif}];
        d.revenus.ventes=(d.revenus.ventes||[]).filter(v=>v.carnetEId!==carnetEId);
        d.carnetsEpargne=d.carnetsEpargne.filter(c=>c.id!==carnetEId);
        return d;
      });
      toast("Achat de Carnet Épargne annulé");
    }});
  };

  const supprimerClient=cliId=>{
    setMdp({msg:"Supprimer définitivement ce client et toutes ses données ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const cli=d.clients.find(c=>c.id===cliId);
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression client",details:`${cli?.nom} ${cli?.prenom}`,motif}];
        d.clients=d.clients.filter(c=>c.id!==cliId);
        d.cartes=d.cartes.filter(c=>c.clientId!==cliId);
        d.carnets=d.carnets.filter(c=>c.clientId!==cliId);
        d.carnetsEpargne=(d.carnetsEpargne||[]).filter(c=>c.clientId!==cliId);
        d.credits=d.credits.filter(c=>c.clientId!==cliId);
        // Nettoyer les revenus liés à ce client pour éviter les chiffres fantômes
        d.revenus.ventes=(d.revenus.ventes||[]).filter(v=>v.clientId!==cliId);
        d.revenus.commissions=(d.revenus.commissions||[]).filter(c=>c.clientId!==cliId);
        d.revenus.penalites=(d.revenus.penalites||[]).filter(p=>p.clientId!==cliId);
        return d;
      });
      toast("Client supprimé");setVue("liste");
    }});
  };

  const clients=useMemo(()=>{
    let res=data.clients;
    if(search.trim()){
      const q=search.toLowerCase();
      res=res.filter(c=>[c.nom,c.prenom,c.surnom,c.numEpargne,
        ...(c.telephones||[]).map(t=>t.numero),
        c.avaliseur1?.nom,c.avaliseur2?.nom,
      ].some(v=>v&&v.toLowerCase().includes(q)));
    }
    return [...res].sort((a,b)=>(a.nom||"").localeCompare(b.nom||"",'fr'));
  },[search,data.clients]);

  if(vue==="addClient")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("liste")}/>
    <PT>Nouveau client</PT>
    <FormulaireClient data={data} up={up} toast={toast}
      onSave={cli=>{setSelId(cli.id);setVue("detail");}} onCancel={()=>setVue("liste")}/>
  </div>;

  if(vue==="editClient")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("detail")}/>
    <PT>Modifier le profil</PT>
    <FormulaireClient data={data} up={up} toast={toast} clientExistant={getCli()}
      onSave={()=>setVue("detail")} onCancel={()=>setVue("detail")}/>
  </div>;

  if(vue==="depot")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("detail")}/>
    <PT>Dépôt épargne</PT>
    <MiniClient cli={getCli()} data={data}/>
    {getCarnetE()&&<AlertBox msg={`Carnet ${getCarnetE().numero||"(numéro à venir)"} · Solde actuel : ${fmt(getCarnetE().soldeEpargne||0)}`} type="info"/>}
    <Card>
      <div style={{fontSize:12,color:C.textM,marginBottom:14}}>📅 {fmtDate()}</div>
      <Inp label="Montant (F) *" type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"/>
      <Inp label="Note (optionnel)" value={form.note||""} onChange={e=>sf("note",e.target.value)} placeholder="..."/>
      <Btn v="green" onClick={saveDepot}>Enregistrer le dépôt</Btn>
    </Card>
  </div>;

  if(vue==="retrait")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("detail")}/>
    <PT>Retrait épargne</PT>
    <MiniClient cli={getCli()} data={data}/>
    <Card>
      <AlertBox msg={`Carnet ${getCarnetE()?.numero||""} · Solde disponible : ${fmt(getCarnetE()?.soldeEpargne||0)}`} type="info"/>
      <div style={{fontSize:12,color:C.textM,marginBottom:14}}>📅 {fmtDate()}</div>
      <Inp label="Montant *" type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"/>
      <Inp label="Retraitant (si différent du titulaire)" value={form.retraitant||""} onChange={e=>sf("retraitant",e.target.value)} placeholder="Nom du retraitant"/>
      <Inp label="Note" value={form.note||""} onChange={e=>sf("note",e.target.value)} placeholder="..."/>
      <Btn v="dan" onClick={demandeRetrait}>Effectuer le retrait</Btn>
    </Card>
    {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
  </div>;

  if(vue==="detail"&&selId){
    const cli=getCli();
    if(!cli)return<div style={{padding:20}}><Back onClick={()=>setVue("liste")}/>Introuvable</div>;
    const dette=calcDetteTotale(selId,data.cartes,data.credits);
    const cartesC=data.cartes.filter(c=>c.clientId===selId);
    const carnetsC=data.carnets.filter(c=>c.clientId===selId);
    const carnetsEC=(data.carnetsEpargne||[]).filter(c=>c.clientId===selId);
    const creditsC=data.credits.filter(c=>c.clientId===selId);
    const totalSoldeE=carnetsEC.reduce((s,c)=>s+(c.soldeEpargne||0),0);
    // Stats globales
    const totalDepose=carnetsEC.flatMap(c=>c.transactions||[]).filter(t=>t.type==="depot").reduce((s,t)=>s+t.montant,0);
    const totalRetire=carnetsEC.flatMap(c=>c.transactions||[]).filter(t=>t.type==="retrait").reduce((s,t)=>s+t.montant,0);
    const totalEmprunte=[...data.cartes.filter(c=>c.clientId===selId&&c.avTotale).map(c=>c.avTotale.montant||0),...data.credits.filter(c=>c.clientId===selId).map(c=>c.montantInitial||0)].reduce((s,v)=>s+v,0);
    const totalRembourse=[...data.cartes.filter(c=>c.clientId===selId&&c.avTotale).map(c=>c.avTotale.rembourse||0),...data.credits.filter(c=>c.clientId===selId).flatMap(c=>(c.remboursements||[]).map(r=>r.montant))].reduce((s,v)=>s+v,0);

    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("liste")}/>
      {/* Header profil */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,borderRadius:16,padding:20,marginBottom:16,color:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
          {cli.photo?<img src={cli.photo} style={{width:56,height:56,borderRadius:"50%",objectFit:"cover",border:"3px solid rgba(255,255,255,0.4)",flexShrink:0}} alt=""/>
            :<div style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,flexShrink:0}}>{cli.nom[0]}{(cli.prenom||"")[0]}</div>}
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800}}>{cli.nom} {cli.prenom}</div>
            {cli.surnom&&<div style={{fontSize:12,opacity:.8}}>«{cli.surnom}»</div>}
          </div>
          <button onClick={()=>setVue("editClient")} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:10}}>
            <div style={{fontSize:10,opacity:.7}}>Épargne{carnetsEC.length===1&&carnetsEC[0].numero?` · ${carnetsEC[0].numero}`:carnetsEC.length>1?` · ${carnetsEC.length} carnets`:""}</div>
            <div style={{fontWeight:800,fontSize:18,fontFamily:"'Playfair Display',serif"}}>{fmt(totalSoldeE)}</div>
          </div>
          <div style={{background:dette>0?"rgba(192,57,43,0.4)":"rgba(255,255,255,0.15)",borderRadius:10,padding:10}}>
            <div style={{fontSize:10,opacity:.7}}>Dette totale</div>
            <div style={{fontWeight:800,fontSize:18,fontFamily:"'Playfair Display',serif"}}>{dette>0?fmt(dette):"Aucune"}</div>
          </div>
        </div>
      </div>

      {/* Dette détaillée */}
      {dette>0&&<Card s={{borderColor:C.red+"50"}}>
        <ST>🔴 Détail de la dette</ST>
        {data.cartes.filter(c=>c.clientId===selId&&c.avTotale?.actif).map(c=>(
          <Row key={c.id} label={`Avance ${c.numero||"Carte M"}`} value={fmt(calcDetteAvance(c))} color={C.red}/>
        ))}
        {data.credits.filter(c=>c.clientId===selId&&c.statut==="actif").map(c=>(
          <Row key={c.id} label={`Crédit Express`} value={fmt(c.restant)} color={C.red}/>
        ))}
        <HR/>
        <Row label="TOTAL DETTE" value={fmt(dette)} color={C.red} bold/>
      </Card>}

      {/* Actions rapides */}
      {(cli.telephones||[]).length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        <a href={`tel:${cli.telephones[0].numero}`} style={{background:C.green+"20",color:C.green,borderRadius:10,padding:"10px 4px",textAlign:"center",fontSize:11,fontWeight:700,textDecoration:"none",display:"block"}}>📞 Appel</a>
        <a href={`sms:${cli.telephones[0].numero}`} style={{background:C.blue+"20",color:C.blue,borderRadius:10,padding:"10px 4px",textAlign:"center",fontSize:11,fontWeight:700,textDecoration:"none",display:"block"}}>💬 SMS</a>
        <a href={`https://wa.me/${cli.telephones[0].numero.replace("+","")}`} target="_blank" style={{background:"#25D36620",color:"#25D366",borderRadius:10,padding:"10px 4px",textAlign:"center",fontSize:11,fontWeight:700,textDecoration:"none",display:"block"}}>📱 WhatsApp</a>
      </div>}

      {/* Opérations — Tontine M en 1er */}
      <ST>1. Tontine Mensuelle (Carte M)</ST>
      {cartesC.length===0&&<AlertBox msg="Aucune carte M. Vendez-en une d'abord." type="info"/>}
      {cartesC.map(c=>{
        const tot=(c.cotisations||[]).reduce((s,x)=>s+x.montant,0);
        const dAv=calcDetteAvance(c);
        const solde=c.avTotale&&!c.avTotale.actif;
        return<div key={c.id} onClick={()=>{setNavExtra({tontineOpen:{type:"carteM",id:c.id}});setTab("tontine");}}
          style={{background:C.surface,border:`1px solid ${dAv>0?C.red+"60":solde?C.green+"60":C.border}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontWeight:700,color:C.primary}}>{c.numero||"(sans N°)"}</div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:C.green}}>{fmt(tot)}</div>
              {solde&&<Badge label="✅ SOLDÉ" color={C.green}/>}
              {dAv>0&&<div style={{fontSize:11,color:C.red}}>🔴 Dette: {fmt(dAv)}</div>}
            </div>
          </div>
          <div style={{fontSize:11,color:C.textL,marginBottom:8}}>Mise: {c.mise?fmt(c.mise)+"/j":"non définie"} · {c.mise?(c.cotisations||[]).reduce((s,x)=>s+(x.cases||Math.round(x.montant/c.mise)),0):0}/31 cases</div>
        </div>;
      })}

      {/* Tontine A en 2e */}
      <ST>2. Tontine Annuelle (Carnet A)</ST>
      {carnetsC.length===0&&<AlertBox msg="Aucun carnet A. Vendez-en un d'abord." type="info"/>}
      {carnetsC.map(c=>{
        const tot=c.pages.reduce((s,p)=>s+(p.cotisations||[]).filter(x=>x.montant>0).reduce((ss,x)=>ss+x.montant,0),0);
        return<div key={c.id} onClick={()=>{setNavExtra({tontineOpen:{type:"carnetA",id:c.id}});setTab("tontine");}}
          style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div style={{fontWeight:700,color:C.primary}}>{c.numero||"(sans N°)"}</div>
            <div style={{fontWeight:700,color:C.gold}}>{fmt(tot)}</div>
          </div>
        </div>;
      })}

      {/* Épargne en 3e */}
      <ST>3. Épargne</ST>
      {carnetsEC.length===0&&<AlertBox msg="Aucun carnet épargne. Vendez-en un d'abord." type="info"/>}
      {carnetsEC.map(c=><div key={c.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:700,color:C.primary}}>{c.numero||"(sans N°)"}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontWeight:700,color:C.blue}}>{fmt(c.soldeEpargne||0)}</div>
            <button onClick={()=>supprimerCarnetEpargne(c.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Btn v="green" onClick={()=>{setSelCarnetEId(c.id);setForm({});setVue("depot");}} s={{marginBottom:0}}>+ Dépôt</Btn>
          <Btn v="dan" onClick={()=>{setSelCarnetEId(c.id);setForm({});setVue("retrait");}} s={{marginBottom:0}}>− Retrait</Btn>
        </div>
      </div>)}

      {/* Crédits */}
      <ST>Crédit Express</ST>
      {creditsC.length===0&&<AlertBox msg="Aucun crédit express pour ce client." type="info"/>}
      {creditsC.map(c=><div key={c.id} onClick={()=>{setNavExtra({creditAction:{type:"open",creditId:c.id}});setTab("credit");}}
        style={{background:C.surface,border:`1px solid ${c.statut==="actif"?C.red+"50":C.border}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Badge label={c.statut==="actif"?"En cours":"✅ SOLDÉ"} color={c.statut==="actif"?C.accent:C.green}/>
        <div style={{fontWeight:700,color:c.statut==="actif"?C.red:C.green}}>{fmt(c.restant)}</div>
      </div>)}
      <Btn v="acc" s={{marginBottom:14}} onClick={()=>{setNavExtra({creditAction:{type:"new",clientId:selId}});setTab("credit");}}>💳 Nouveau Crédit Express</Btn>

      {/* Infos client */}
      <Card>
        {(cli.telephones||[]).map((t,i)=><Row key={i} label={`Tél ${i+1}`} value={t.numero}/>)}
        {cli.profession&&<Row label="Profession" value={cli.profession}/>}
        {cli.adresse&&<Row label="Résidence" value={cli.adresse}/>}
        {cli.lieuActivite&&<Row label="Activité" value={cli.lieuActivite}/>}
      </Card>

      {/* Avaliseurs */}
      {(cli.avaliseur1||cli.avaliseur2)&&<>
        <ST>Avaliseurs</ST>
        {[cli.avaliseur1,cli.avaliseur2].filter(Boolean).map((av,i)=>(
          <Card key={i}>
            <div style={{fontWeight:700,color:C.primary,marginBottom:8}}>👤 Avaliseur {i+1} : {av.nom} {av.prenom}</div>
            {av.numero&&<Row label="Téléphone" value={av.numero}/>}
            {av.profession&&<Row label="Profession" value={av.profession}/>}
            {av.adresse&&<Row label="Résidence" value={av.adresse}/>}
            {av.numero&&<div style={{display:"flex",gap:8,marginTop:8}}>
              <a href={`tel:${av.numero}`} style={{background:C.green+"20",color:C.green,borderRadius:8,padding:"7px 12px",fontSize:11,fontWeight:700,textDecoration:"none"}}>📞</a>
              <a href={`sms:${av.numero}`} style={{background:C.blue+"20",color:C.blue,borderRadius:8,padding:"7px 12px",fontSize:11,fontWeight:700,textDecoration:"none"}}>💬</a>
              <a href={`https://wa.me/${av.numero.replace("+","")}`} target="_blank" style={{background:"#25D36620",color:"#25D366",borderRadius:8,padding:"7px 12px",fontSize:11,fontWeight:700,textDecoration:"none"}}>📱</a>
            </div>}
          </Card>
        ))}
      </>}

      {/* Historique financier */}
      <ST>Historique financier global</ST>
      <Card>
        <Row label="Total épargné" value={fmt(totalDepose)} color={C.green}/>
        <Row label="Total retiré" value={fmt(totalRetire)} color={C.red}/>
        <Row label="Total emprunté" value={fmt(totalEmprunte)} color={C.accent}/>
        <Row label="Total remboursé" value={fmt(totalRembourse)} color={C.green}/>
        <HR/>
        <Row label="Dette actuelle" value={dette>0?fmt(dette):"Aucune"} color={dette>0?C.red:C.green} bold/>
        <Row label="Cartes M achetées" value={cartesC.length}/>
        <Row label="Carnets A achetés" value={carnetsC.length}/>
        <Row label="Carnets Épargne" value={carnetsEC.length}/>
      </Card>

      {/* Historique épargne (toutes les carnets) */}
      <ST>Historique épargne</ST>
      {carnetsEC.flatMap(c=>(c.transactions||[]).map(t=>({...t,carnetNum:c.numero,carnetEId:c.id}))).length===0&&<div style={{textAlign:"center",color:C.textL,padding:16,fontSize:13}}>Aucune transaction</div>}
      {carnetsEC.flatMap(c=>(c.transactions||[]).map(t=>({...t,carnetNum:c.numero,carnetEId:c.id}))).slice().reverse().map(t=><div key={t.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <Badge label={t.type==="depot"?"↓ Dépôt":"↑ Retrait"} color={t.type==="depot"?C.green:C.red}/>
          <div style={{fontSize:11,color:C.textL,marginTop:4,lineHeight:1.4}}>{t.carnetNum?`${t.carnetNum} · `:""}{fmtDate(t.date)}{t.retraitant&&t.retraitant!=="Titulaire"?<div>Par : {t.retraitant}</div>:""}{t.note?<div>{t.note}</div>:""}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:14,color:t.type==="depot"?C.green:C.red}}>{t.type==="depot"?"+":"-"}{fmt(t.montant)}</div>
          <button onClick={()=>{setSelCarnetEId(t.carnetEId);setEditOp({type:"transactionEpargne",id:t.id,montant:t.montant,date:t.date,note:t.note});}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>✏️</button>
          <button onClick={()=>{setSelCarnetEId(t.carnetEId);delTx(t.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
        </div>
      </div>)}
      <HR/>
      <Btn v="dan" onClick={()=>supprimerClient(selId)}>🗑 Supprimer ce client</Btn>
      <Btn v="acc" onClick={()=>{setSelId(null);setVue("addClient");}}>+ Nouveau client</Btn>
      {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
      {editOp&&editOp.type==="transactionEpargne"&&<EditOpModal titre="Transaction épargne" montant={editOp.montant} date={editOp.date} note={editOp.note} avecNote={true}
        onSave={saveEditTx} onClose={()=>setEditOp(null)}/>}
    </div>;
  }

  return<div style={{padding:"16px 14px 80px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <PT s={{margin:0}}>Clients ({data.clients.length})</PT>
      <Btn v="acc" onClick={()=>setVue("addClient")} s={{width:"auto",marginBottom:0,padding:"9px 16px",fontSize:13}}>+ Client</Btn>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Nom, prénom, téléphone, avaliseur..."
      style={{width:"100%",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 16px",fontSize:14,outline:"none",marginBottom:14}}/>
    {clients.map(cli=>{
      const dette=calcDetteTotale(cli.id,data.cartes,data.credits);
      const cEs=(data.carnetsEpargne||[]).filter(c=>c.clientId===cli.id);
      const soldeE=cEs.reduce((s,c)=>s+(c.soldeEpargne||0),0);
      return<div key={cli.id} onClick={()=>{setSelId(cli.id);setVue("detail");}} style={{background:C.surface,border:`1px solid ${dette>0?C.red+"50":C.border}`,borderRadius:14,padding:"13px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12,boxShadow:`0 1px 6px ${C.shadow}`}}>
        {cli.photo?<img src={cli.photo} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt=""/>
          :<div style={{width:42,height:42,borderRadius:"50%",background:C.primary+"20",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:C.primary,flexShrink:0,fontSize:14}}>{(cli.nom||"?")[0]}{(cli.prenom||"")[0]}</div>}
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14}}>{cli.nom} {cli.prenom}</div>
          <div style={{fontSize:11,color:C.textL}}>{cEs[0]?.numero||""}{(cli.telephones||[])[0]?` · ${cli.telephones[0].numero}`:""}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontWeight:700,color:C.primary,fontSize:13}}>{fmt(soldeE)}</div>
          {dette>0&&<div style={{fontSize:11,color:C.red,fontWeight:600}}>🔴 {fmt(dette)}</div>}
        </div>
      </div>;
    })}
    {clients.length===0&&<div style={{textAlign:"center",color:C.textL,padding:40,fontSize:14}}>{data.clients.length===0?"Aucun client enregistré":"Aucun résultat"}</div>}
  </div>;
}

// ═══════════════════════════════════
// MODULE TONTINE
// ═══════════════════════════════════
function Tontine({data,up,toast,role,setTab,navExtra,setNavExtra}){
  const[onglet,setOnglet]=useState("carteM");
  const[vue,setVue]=useState("home");
  const[selId,setSelId]=useState(null);
  const[moisIdx,setMoisIdx]=useState(0);
  const[mdp,setMdp]=useState(null);
  const[editOp,setEditOp]=useState(null); // {type,id,montant,date,note} en cours de modification
  const[form,setForm]=useState({});
  const[choixClient,setChoixClient]=useState(false);
  const[newClient,setNewClient]=useState(false);
  const[clientPickerMode,setClientPickerMode]=useState(null); // "cotM"|"cotA"|"epargne"|"creditRemb"
  const[cotisationChain,setCotisationChain]=useState(null); // "carteM"|"carnetA"|"epargne" — enchaîner vente→cotisation
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const getCarte=()=>data.cartes.find(c=>c.id===selId);
  const getCarnet=()=>data.carnets.find(c=>c.id===selId);
  const getCarnetE=()=>(data.carnetsEpargne||[]).find(c=>c.id===selId);

  // Navigation depuis un autre module (profil client → ouvrir carte/carnet, ou vente prefilled)
  useEffect(()=>{
    if(navExtra?.tontineOpen){
      const{type,id}=navExtra.tontineOpen;
      if(type==="carteM"){setSelId(id);setOnglet("carteM");setVue("detail");}
      else if(type==="carnetA"){setSelId(id);setOnglet("carnetA");setVue("detailCarnet");}
      setNavExtra(null);
    }else if(navExtra?.tontineVente){
      const{type,clientId}=navExtra.tontineVente;
      sf("clientId",clientId);
      setNewClient(false);
      if(type==="carteM"){setOnglet("carteM");setChoixClient("form");}
      else if(type==="carnetA"){setOnglet("carnetA");setChoixClient("form");}
      else if(type==="carnetE"){setOnglet("carnetE");setChoixClient("form");}
      setNavExtra(null);
    }
  },[navExtra]);

  // ── CARTE M ──
  const creerCarte=()=>{
    if(!form.clientId)return toast("Sélectionnez un client","error");
    const pv=parseInt(form.prixVente);if(!pv||pv<=0)return toast("Saisissez le prix","error");
    const dette=calcDetteTotale(form.clientId,data.cartes,data.credits);
    if(dette>0){
      setMdp({msg:`⚠ Ce client a une dette de ${fmt(dette)} en cours.\nNormalement pas de nouvelle carte tant que la dette n'est pas soldée.\nVoulez-vous continuer quand même ?`,
        onOk:()=>doCarte()});
    }else doCarte();
  };

  const doCarte=()=>{
    const pv=parseInt(form.prixVente);
    const carteId=uid();
    const carte={id:carteId,clientId:form.clientId,mise:null,cotisations:[],avPartielles:[],avTotale:null,statut:"actif",dateCreation:isoNow(),dateDebut:null,numero:null,prixVente:pv,typeVente:form.typeVente||"normal",commission:null};
    up(d=>{
      d.cartes=[...d.cartes,carte];
      d.revenus.ventes=[...(d.revenus.ventes||[]),{id:uid(),type:"carteM",typeVente:form.typeVente||"normal",montant:pv,clientId:form.clientId,carteId,date:isoNow()}];
      return d;
    });
    toast("Carte créée ! Vente de "+fmt(pv)+" enregistrée");
    if(cotisationChain==="carteM"){
      setForm({});setChoixClient(false);setNewClient(false);setCotisationChain(null);
      setSelId(carteId);setVue("cotisation");
    }else{
      setForm({});setChoixClient(false);setNewClient(false);setVue("home");
    }
  };

  const enregCotisation=()=>{
    const carte=getCarte();const mt=parseInt(form.montant);
    if(!mt||mt<=0)return toast("Montant invalide","error");
    const mise=parseInt(form.mise)||carte.mise;
    if(!mise||mise<=0)return toast("Saisissez la mise journalière","error");
    if(mt%mise!==0)return toast(`Montant doit être un multiple de ${fmt(mise)}`,"error");
    const casesOcc=(carte.cotisations||[]).reduce((s,c)=>s+(c.cases||Math.round(c.montant/(carte.mise||mise))),0);
    const casesD=mt/mise;
    if(casesOcc+casesD>31)return toast(`Seulement ${31-casesOcc} case(s) dispo. Max: ${fmt((31-casesOcc)*mise)}`,"error");
    if(mt>30000){setMdp({msg:`Mise de ${fmt(mt)} dépasse 30 000 F. Autorisation requise.`,onOk:()=>doCotisation(mt,mise)});}
    else doCotisation(mt,mise);
  };

  const doCotisation=(mt,mise)=>{
    up(d=>{
      const i=d.cartes.findIndex(c=>c.id===selId);const carte=d.cartes[i];
      const est1er=!carte.dateDebut;
      if(est1er){
        carte.dateDebut=isoNow();carte.mise=mise;
        carte.numero=getNumCarteM(d.clients,carte.clientId,d.cartes);
        carte.commission=mise;
        d.revenus.commissions=[...(d.revenus.commissions||[]),{id:uid(),type:"carteM",montant:mise,clientId:carte.clientId,numero:carte.numero,date:isoNow()}];
      }
      carte.cotisations=[...(carte.cotisations||[]),{id:uid(),montant:mt,cases:mt/mise,date:isoNow()}];
      // Vérifier si la carte est soldée (avance totale + partielles remboursées)
      if(carte.avTotale?.actif){
        const totalCotise=carte.cotisations.reduce((s,c)=>s+c.montant,0);
        const cotHorsComm=Math.max(0,totalCotise-(carte.commission||0));
        const totalAvP=(carte.avPartielles||[]).reduce((s,a)=>s+a.montant,0);
        const detteRestante=Math.max(0,(carte.avTotale.montant||0)+totalAvP-cotHorsComm+(carte.avTotale.penalite||0));
        if(detteRestante<=0){
          carte.avTotale.actif=false;
          carte.statut="soldé";
        }
      }
      // Vérifier si toutes les 31 cases sont cochées
      const totalCases=carte.cotisations.reduce((s,c)=>s+(c.cases||Math.round(c.montant/mise)),0);
      if(totalCases>=31)carte.statut="soldé";
      return d;
    });
    toast(`Cotisation ${fmt(mt)} (${mt/mise} case(s)) enregistrée`);
    setForm({});setVue("detail");
  };

  const demandeAvanceP=()=>{
    const carte=getCarte();
    const total=(carte.cotisations||[]).reduce((s,c)=>s+c.montant,0);
    const comm=carte.commission||0;const totalAvP=(carte.avPartielles||[]).reduce((s,a)=>s+a.montant,0);
    const max=total-comm-totalAvP;const nb=(carte.avPartielles||[]).length;
    if(nb>=2)return toast("Maximum 2 avances partielles atteint","error");
    const mt=parseInt(form.montantAv);
    if(!mt||mt<=0||mt>max)return toast(`Maximum disponible : ${fmt(max)}`,"error");
    setMdp({msg:`Avance partielle de ${fmt(mt)}. Code spécial requis.`,
      onOk:()=>{
        up(d=>{const i=d.cartes.findIndex(c=>c.id===selId);
          d.cartes[i].avPartielles=[...(d.cartes[i].avPartielles||[]),{id:uid(),montant:mt,date:isoNow()}];return d;});
        toast("Avance partielle de "+fmt(mt)+" enregistrée");setForm({});setVue("detail");
      }});
  };

  const demandeAvanceTotale=()=>{
    const carte=getCarte();
    if(carte.avTotale?.actif)return toast("Avance totale déjà en cours","error");
    if(!(carte.cotisations||[]).length)return toast("Au moins 1 cotisation requise","error");
    const mise=carte.mise;if(!mise)return toast("Mise non définie","error");
    const maxAt=mise*30;const mt=parseInt(form.montantAt)||maxAt;
    if(mt<=0||mt>maxAt)return toast(`Maximum : ${fmt(maxAt)}`,"error");
    // Vérifier dette existante
    const detteExist=calcDetteTotale(carte.clientId,data.cartes,data.credits);
    if(detteExist>0){
      setMdp({msg:`⚠ Ce client a déjà une dette de ${fmt(detteExist)}.\nNormalement pas de nouvelle avance tant que la dette n'est pas soldée.\nAutorisation requise pour continuer.`,
        onOk:()=>doAvanceTotale(mt,mise)});
    }else{
      setMdp({msg:`Avance totale de ${fmt(mt)}. Code spécial requis.`,onOk:()=>doAvanceTotale(mt,mise)});
    }
  };

  const doAvanceTotale=(mt,mise)=>{
    up(d=>{const i=d.cartes.findIndex(c=>c.id===selId);
      d.cartes[i].avTotale={actif:true,montant:mt,debut:isoNow(),penalite:0,rembourse:0};return d;});
    toast(`Avance totale de ${fmt(mt)} accordée`);setForm({});setVue("detail");
  };

  const enregPenaliteCarte=()=>{
    const mt=parseInt(form.penalite);if(!mt||mt<=0)return toast("Montant invalide","error");
    const carte=getCarte();
    up(d=>{const i=d.cartes.findIndex(c=>c.id===selId);
      d.cartes[i].avTotale.penalite=(d.cartes[i].avTotale.penalite||0)+mt;
      d.revenus.penalites=[...(d.revenus.penalites||[]),{id:uid(),type:"carteM",montant:mt,clientId:carte.clientId,date:isoNow()}];
      return d;});
    toast("Pénalité de "+fmt(mt)+" enregistrée");setForm({});setVue("detail");
  };

  const delCotisation=(cotId)=>{
    setMdp({msg:"Supprimer cette cotisation ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{const i=d.cartes.findIndex(c=>c.id===selId);
        d.cartes[i].cotisations=d.cartes[i].cotisations.filter(c=>c.id!==cotId);
        if(!d.cartes[i].cotisations.length){
          // Retirer la commission liée à cette carte du module Revenus (plus de cotisation = plus de commission perçue)
          d.revenus.commissions=(d.revenus.commissions||[]).filter(c=>!(c.type==="carteM"&&c.numero===d.cartes[i].numero));
          d.cartes[i].dateDebut=null;d.cartes[i].numero=null;d.cartes[i].commission=null;
        }
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression cotisation Carte M",details:d.cartes[i].numero||"",motif}];
        return d;});
      toast("Cotisation supprimée");
    }});
  };

  const saveEditCotisation=({montant,date,motif})=>{
    up(d=>{
      const i=d.cartes.findIndex(c=>c.id===selId);
      const carte=d.cartes[i];
      const mise=carte.mise;
      const ci=carte.cotisations.findIndex(c=>c.id===editOp.id);
      if(ci===-1)return d;
      const ancien=carte.cotisations[ci].montant;
      carte.cotisations[ci].montant=montant;
      carte.cotisations[ci].date=date;
      if(mise)carte.cotisations[ci].cases=Math.round(montant/mise);
      // Si c'était la cotisation-commission (1ère), garder la commission alignée sur la mise, pas sur le montant modifié
      d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Modification cotisation Carte M",details:`${fmt(ancien)} → ${fmt(montant)}`,motif}];
      return d;
    });
    toast("Cotisation modifiée");
  };

  const delAvancePartielle=(avId)=>{
    setMdp({msg:"Supprimer cette avance partielle ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{const i=d.cartes.findIndex(c=>c.id===selId);
        d.cartes[i].avPartielles=(d.cartes[i].avPartielles||[]).filter(a=>a.id!==avId);
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression avance partielle",details:d.cartes[i].numero||"",motif}];
