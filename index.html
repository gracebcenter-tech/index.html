              <button onClick={delAvanceTotale} style={{flex:1,background:C.red+"15",color:C.red,border:"none",borderRadius:8,padding:"8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑 Annuler l'avance totale</button>
              {carte.avTotale.penalite>0&&<button onClick={delPenaliteCarte} style={{flex:1,background:C.red+"15",color:C.red,border:"none",borderRadius:8,padding:"8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑 Suppr. pénalité</button>}
            </div>
          </>}
        </Card>
        {!estFerme&&<div style={{display:"grid",gridTemplateColumns:carte.avTotale?.actif?"1fr":"1fr 1fr",gap:8,marginBottom:8}}>
          <Btn onClick={()=>{setForm({});setVue("cotisation");}} s={{marginBottom:0}}>+ Cotisation</Btn>
          {!carte.avTotale?.actif&&<Btn v="ghost" onClick={()=>{setForm({});setVue("avanceP");}} s={{marginBottom:0}}>Avance partielle</Btn>}
        </div>}
        {!estFerme&&!carte.avTotale?.actif&&<Btn v="gold" onClick={()=>{setForm({montantAt:mise*30});setVue("avanceTotale");}}>Avance totale (max {fmt(mise*30)})</Btn>}
        {!estFerme&&avEnRetard&&<Btn v="dan" onClick={()=>{setForm({});setVue("penaliteCarte");}}>Enregistrer pénalité</Btn>}
        <ST>Cotisations</ST>
        {(carte.cotisations||[]).slice().reverse().map((c,ci)=>{
          const colorIdx=(carte.cotisations.length-1-ci)%CASE_COLORS.length;
          return<div key={c.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:CASE_COLORS[colorIdx],flexShrink:0}}/>
              <div>
                <div style={{fontSize:12,color:C.textM}}>{fmtDate(c.date)}</div>
                <div style={{fontSize:11,color:C.textL}}>{mise?c.cases||Math.round(c.montant/mise):"-"} case(s){c.montant===comm?" · 🏷 commission":""}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,color:C.green}}>+{fmt(c.montant)}</span>
              <button onClick={()=>setEditOp({type:"cotisationCarteM",id:c.id,montant:c.montant,date:c.date})} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>✏️</button>
              <button onClick={()=>delCotisation(c.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
            </div>
          </div>;
        })}
        {(carte.avPartielles||[]).length>0&&<>
          <ST>Avances partielles</ST>
          {carte.avPartielles.slice().reverse().map(a=>(
            <div key={a.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:12,color:C.textM}}>{fmtDate(a.date)}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:700,color:C.blue}}>{fmt(a.montant)}</span>
                <button onClick={()=>setEditOp({type:"avancePartielle",id:a.id,montant:a.montant,date:a.date})} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>✏️</button>
                <button onClick={()=>delAvancePartielle(a.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
              </div>
            </div>
          ))}
        </>}
        <HR/>
        <Btn v="dan" onClick={supprimerVenteCarteM}>🗑 Supprimer cette vente (Carte M)</Btn>
        {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
        {editOp&&editOp.type==="cotisationCarteM"&&<EditOpModal titre="Cotisation" montant={editOp.montant} date={editOp.date} avecNote={false}
          onSave={saveEditCotisation} onClose={()=>setEditOp(null)}/>}
        {editOp&&editOp.type==="avancePartielle"&&<EditOpModal titre="Avance partielle" montant={editOp.montant} date={editOp.date} avecNote={false}
          onSave={saveEditAvancePartielle} onClose={()=>setEditOp(null)}/>}
      </div>;
    }
  }

  // ── CARNET A ──
  if(onglet==="carnetA"){
    if(choixClient===true)return<ChoixClientScreen titre="Nouveau Carnet A" onBack={()=>{setChoixClient(false);setNewClient(false);setCotisationChain(null);}}/>;
    if(choixClient==="form")return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>{setChoixClient(true);setNewClient(false);}}/><PT>Nouveau Carnet A</PT>
      {(()=>{const cli=data.clients.find(c=>c.id===form.clientId);return cli&&<MiniClient cli={cli} data={data}/>;})()}
      <Card>
        <Sel label="Type de vente" value={form.typeVente||"normal"} onChange={e=>sf("typeVente",e.target.value)}>
          <option value="normal">Vente normale</option><option value="cp">CP — Carnet Perdu</option>
        </Sel>
        <Inp label="Prix du carnet (F) *" type="number" inputMode="numeric" value={form.prixVente||""} onChange={e=>sf("prixVente",e.target.value)} placeholder="0"/>
        <AlertBox msg="La mise de chaque page sera saisie à la 1ère cotisation de cette page." type="info"/>
        <Btn onClick={creerCarnet}>Créer le carnet</Btn>
      </Card>
    </div>;

    if(vue==="misePage")return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("detailCarnet")}/><PT>Enregistrer une mise</PT>
      {(()=>{const carnet=getCarnet();const p=carnet?.pages[moisIdx];const mise=p?.mise;
        const casesOcc=mise?(p?.cotisations||[]).filter(c=>c.montant>0).reduce((s,c)=>s+(c.montant/mise),0):0;
        const est1ere=!p?.dateDebut;
        return<Card>
          <div style={{marginBottom:8}}><Badge label={`Page ${moisIdx+1} — ${p?.nom}`} color={C.gold}/></div>
          {mise&&<AlertBox msg={`Cases dispo: ${31-Math.round(casesOcc)}/31 · Mise: ${fmt(mise)}/jour`} type="info"/>}
          <div style={{fontSize:12,color:C.textM,marginBottom:14}}>📅 {fmtDate()}</div>
          {est1ere&&<Inp label="Mise journalière de cette page (F) *" type="number" inputMode="numeric" value={form.mise||""} onChange={e=>sf("mise",e.target.value)} placeholder="ex: 500" hint="Commission = 1 mise journalière"/>}
          <Inp label={`Montant ${mise?`(multiple de ${fmt(mise)})`:"(F)"} *`} type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"
            hint={form.montant&&(parseInt(form.mise)||mise)&&parseInt(form.montant)>0?`= ${Math.floor(parseInt(form.montant)/(parseInt(form.mise)||mise))} case(s)`:""}/>
          <Btn v="acc" onClick={()=>enregMise(moisIdx)}>Enregistrer</Btn>
        </Card>;})()}
    </div>;

    if(vue==="retraitPage")return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("detailCarnet")}/><PT>Retrait carnet</PT>
      {(()=>{const carnet=getCarnet();const p=carnet?.pages[moisIdx];
        const total=p?(p.cotisations||[]).filter(c=>c.montant>0).reduce((s,c)=>s+c.montant,0):0;
        const comm=p?.commission||0;const retraits=p?(p.cotisations||[]).filter(c=>c.montant<0).reduce((s,c)=>s+Math.abs(c.montant),0):0;
        const dispo=Math.max(0,total-comm-retraits);
        return<Card>
          <div style={{marginBottom:8}}><Badge label={`Page ${moisIdx+1} — ${p?.nom}`} color={C.gold}/></div>
          <AlertBox msg={`Disponible : ${fmt(dispo)}`} type="success"/>
          <Inp label="Montant *" type="number" inputMode="numeric" value={form.montantR||""} onChange={e=>sf("montantR",e.target.value)} placeholder="0"/>
          <Btn v="dan" onClick={()=>demandeRetraitCarnet(moisIdx)}>Effectuer le retrait</Btn>
        </Card>;})()}
      {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
    </div>;

    if(vue==="detailCarnet"&&selId){
      const carnet=getCarnet();
      if(!carnet)return<div style={{padding:20}}><Back onClick={()=>setVue("home")}/>Introuvable</div>;
      const cli=data.clients.find(c=>c.id===carnet.clientId);
      return<div style={{padding:"16px 14px 80px"}}>
        <Back onClick={()=>setVue("home")}/>
        <PT>{carnet.numero||"Carnet sans N°"}</PT>
        {cli&&<MiniClient cli={cli} data={data}/>}
        <ST>12 pages — Cotisez librement sur n'importe quelle page</ST>
        {carnet.pages.map((p,i)=>{
          const total=(p.cotisations||[]).filter(c=>c.montant>0).reduce((s,c)=>s+c.montant,0);
          const retraits=(p.cotisations||[]).filter(c=>c.montant<0).reduce((s,c)=>s+Math.abs(c.montant),0);
          const comm=p.commission||0;const dispo=Math.max(0,total-comm-retraits);
          const mise=p.mise||0;
          const casesOcc=mise?(p.cotisations||[]).filter(c=>c.montant>0).reduce((s,c)=>s+(c.montant/mise),0):0;
          const delaiDep=p.dateDebut&&Math.floor((Date.now()-new Date(p.dateDebut))/86400000)>30;
          return<div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontWeight:700,color:C.primary,fontSize:14}}>Page {i+1} — {p.nom}</div>
              <div style={{fontWeight:700,color:C.green,fontSize:14}}>{fmt(dispo)}</div>
            </div>
            {mise>0&&<><div style={{fontSize:11,color:C.textL,marginBottom:6}}>Mise: {fmt(mise)}/j · {Math.round(casesOcc)}/31 · Commission: {fmt(comm)}</div>
              <Grille31 cotisations={p.cotisations?.filter(c=>c.montant>0)} mise={mise}/></>}
            {!mise&&<div style={{fontSize:11,color:C.textL,marginBottom:8,fontStyle:"italic"}}>Pas encore de mise définie</div>}
            {delaiDep&&<AlertBox msg="⏰ Délai 1 mois dépassé." type="warn"/>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button onClick={()=>{setMoisIdx(i);setForm({});setVue("misePage");}} style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Mise</button>
              <button onClick={()=>{setMoisIdx(i);setForm({});setVue("retraitPage");}} style={{background:"transparent",color:C.red,border:`1.5px solid ${C.red}`,borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer"}}>− Retrait</button>
            </div>
            {(p.cotisations||[]).slice().reverse().slice(0,3).map(c=><div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderTop:`1px solid ${C.border}`,marginTop:8}}>
              <div style={{fontSize:11,color:C.textL}}>{fmtDate(c.date)}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:600,fontSize:12,color:c.montant<0?C.red:C.green}}>{c.montant<0?"-":"+"}{fmt(Math.abs(c.montant))}</span>
                {c.montant>0&&<button onClick={()=>setEditOp({type:"miseCarnetA",id:c.id,idx:i,montant:c.montant,date:c.date})} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:C.textL,padding:2}}>✏️</button>}
                {c.montant>0&&<button onClick={()=>delMise(i,c.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:C.textL,padding:2}}>🗑</button>}
              </div>
            </div>)}
          </div>;
        })}
        <HR/>
        <Btn v="dan" onClick={supprimerVenteCarnetA}>🗑 Supprimer cette vente (Carnet A)</Btn>
        {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
        {editOp&&editOp.type==="miseCarnetA"&&<EditOpModal titre="Mise Carnet A" montant={editOp.montant} date={editOp.date} avecNote={false}
          onSave={saveEditMise} onClose={()=>setEditOp(null)}/>}
      </div>;
    }
  }

  // ── CARNET ÉPARGNE (vente) ──
  if(onglet==="carnetE"){
    if(choixClient===true)return<ChoixClientScreen titre="Nouveau Carnet Épargne" onBack={()=>{setChoixClient(false);setNewClient(false);setCotisationChain(null);}}/>;
    if(choixClient==="form")return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>{setChoixClient(true);setNewClient(false);}}/><PT>Nouveau Carnet Épargne</PT>
      {(()=>{const cli=data.clients.find(c=>c.id===form.clientId);return cli&&<MiniClient cli={cli} data={data}/>;})()}
      <Card>
        <Sel label="Type de vente" value={form.typeVente||"normal"} onChange={e=>sf("typeVente",e.target.value)}>
          <option value="normal">Vente normale</option><option value="cp">CP — Carnet Perdu</option>
        </Sel>
        <Inp label="Prix du carnet (F) *" type="number" inputMode="numeric" value={form.prixVente||""} onChange={e=>sf("prixVente",e.target.value)} placeholder="0"/>
        <AlertBox msg="Le numéro (01E, 01E1...) sera attribué au 1er dépôt." type="info"/>
        <Btn onClick={creerCarnetEpargne}>Créer le carnet épargne</Btn>
      </Card>
    </div>;
  }

  // ── PICKER GÉNÉRIQUE POUR COTISATION ──
  if(clientPickerMode){
    const titres={cotM:"Cotisation — Sur Carte M",cotA:"Cotisation — Sur Carnet A",epargne:"Cotisation — Sur Épargne",creditRemb:"Remboursement Crédit Express"};
    const handleClient=cli=>{
      if(clientPickerMode==="cotM"){
        const actives=data.cartes.filter(c=>c.clientId===cli.id&&c.statut==="actif");
        setClientPickerMode(null);setNewClient(false);
        if(actives.length===0){
          sf("clientId",cli.id);setOnglet("carteM");setChoixClient("form");setCotisationChain("carteM");
          toast("Aucune Carte M active — vendons-en une à "+cli.nom,"info");
        }
        else if(actives.length===1){setOnglet("carteM");setSelId(actives[0].id);setVue("detail");}
        else{setOnglet("carteM");setPickClientId(cli.id);setVue("pickCarte");}
      }else if(clientPickerMode==="cotA"){
        const actifs=data.carnets.filter(c=>c.clientId===cli.id&&c.statut==="actif");
        setClientPickerMode(null);setNewClient(false);
        if(actifs.length===0){
          sf("clientId",cli.id);setOnglet("carnetA");setChoixClient("form");setCotisationChain("carnetA");
          toast("Aucun Carnet A — vendons-en un à "+cli.nom,"info");
        }
        else if(actifs.length===1){setOnglet("carnetA");setSelId(actifs[0].id);setVue("detailCarnet");}
        else{setOnglet("carnetA");setPickClientId(cli.id);setVue("pickCarnet");}
      }else if(clientPickerMode==="epargne"){
        const carnetsEC=(data.carnetsEpargne||[]).filter(c=>c.clientId===cli.id);
        setClientPickerMode(null);setNewClient(false);
        if(carnetsEC.length===0){
          sf("clientId",cli.id);setOnglet("carnetE");setChoixClient("form");setCotisationChain("epargne");
          toast("Aucun carnet épargne — vendons-en un à "+cli.nom,"info");
        }else{
          setNavExtra({clientId:cli.id});setTab("clients");
        }
      }else if(clientPickerMode==="creditRemb"){
        const crActif=data.credits.find(c=>c.clientId===cli.id&&c.statut==="actif");
        setClientPickerMode(null);setNewClient(false);
        if(crActif){setNavExtra({creditAction:{type:"remb",creditId:crActif.id}});setTab("credit");}
        else{toast("Aucun crédit actif. Création d'un nouveau crédit.","info");setNavExtra({creditAction:{type:"new",clientId:cli.id}});setTab("credit");}
      }
    };
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>{setClientPickerMode(null);setNewClient(false);}}/>
      <PT>{titres[clientPickerMode]}</PT>
      {!newClient
        ?<ClientSelector data={data}
            onNew={clientPickerMode==="creditRemb"
              ?()=>toast("Un nouveau client n'a pas encore de crédit à rembourser","info")
              :()=>setNewClient(true)}
            onSelect={handleClient}/>
        :<FormulaireClient data={data} up={up} toast={toast} onSave={handleClient} onCancel={()=>setNewClient(false)}/>}
    </div>;
  }

  // ── PICK CARTE M (si plusieurs cartes actives) ──
  if(vue==="pickCarte"){
    const actives=data.cartes.filter(c=>c.clientId===pickClientId&&c.statut==="actif");
    const cli=data.clients.find(c=>c.id===pickClientId);
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("cotisationMenu")}/>
      <PT>Choisir une Carte M</PT>
      {cli&&<MiniClient cli={cli} data={data}/>}
      {actives.map(c=>{
        const tot=(c.cotisations||[]).reduce((s,x)=>s+x.montant,0);
        const dAv=calcDetteAvance(c);
        return<div key={c.id} onClick={()=>{setSelId(c.id);setVue("detail");}} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:700,color:C.primary}}>{c.numero||"(sans N°)"}</div>
            <div style={{fontSize:11,color:C.textL}}>Mise: {c.mise?fmt(c.mise)+"/j":"—"}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontWeight:700,color:C.green}}>{fmt(tot)}</div>
            {dAv>0&&<div style={{fontSize:11,color:C.red}}>🔴 {fmt(dAv)}</div>}</div>
        </div>;
      })}
    </div>;
  }

  // ── PICK CARNET A (si plusieurs carnets actifs) ──
  if(vue==="pickCarnet"){
    const actifs=data.carnets.filter(c=>c.clientId===pickClientId&&c.statut==="actif");
    const cli=data.clients.find(c=>c.id===pickClientId);
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("cotisationMenu")}/>
      <PT>Choisir un Carnet A</PT>
      {cli&&<MiniClient cli={cli} data={data}/>}
      {actifs.map(c=>{
        const tot=c.pages.reduce((s,p)=>s+(p.cotisations||[]).filter(x=>x.montant>0).reduce((ss,x)=>ss+x.montant,0),0);
        return<div key={c.id} onClick={()=>{setSelId(c.id);setVue("detailCarnet");}} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,color:C.primary}}>{c.numero||"(sans N°)"}</div>
          <div style={{fontWeight:700,color:C.gold}}>{fmt(tot)}</div>
        </div>;
      })}
    </div>;
  }

  // ── VENTE MENU ──
  if(vue==="venteMenu"){
    const MenuCard=({icon,titre,desc,onClick,color})=>(
      <div onClick={onClick} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:12,cursor:"pointer",boxShadow:`0 2px 12px ${C.shadow}`,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:28,width:48,height:48,borderRadius:12,background:color+"15",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:C.primary}}>{titre}</div>
          <div style={{fontSize:12,color:C.textL,marginTop:2}}>{desc}</div>
        </div>
        <div style={{color:C.textL,fontSize:18}}>›</div>
      </div>
    );
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("home")}/>
      <PT>🛒 Vente</PT>
      <MenuCard icon="🗓" titre="Vente Carte M" desc="Tontine mensuelle — vente normale ou CP" color={C.primary}
        onClick={()=>{setOnglet("carteM");setChoixClient(true);setNewClient(false);setForm({});}}/>
      <MenuCard icon="📓" titre="Vente Carnet A" desc="Tontine annuelle — vente normale ou CP" color={C.gold}
        onClick={()=>{setOnglet("carnetA");setChoixClient(true);setNewClient(false);setForm({});}}/>
      <MenuCard icon="🏦" titre="Vente Carnet Épargne" desc="Carnet d'épargne — vente normale ou CP" color={C.blue}
        onClick={()=>{setOnglet("carnetE");setChoixClient(true);setNewClient(false);setForm({});}}/>
    </div>;
  }

  // ── COTISATION MENU ──
  if(vue==="cotisationMenu"){
    const MenuCard=({icon,titre,desc,onClick,color})=>(
      <div onClick={onClick} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:12,cursor:"pointer",boxShadow:`0 2px 12px ${C.shadow}`,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:28,width:48,height:48,borderRadius:12,background:color+"15",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:C.primary}}>{titre}</div>
          <div style={{fontSize:12,color:C.textL,marginTop:2}}>{desc}</div>
        </div>
        <div style={{color:C.textL,fontSize:18}}>›</div>
      </div>
    );
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("home")}/>
      <PT>💰 Cotisation</PT>
      <MenuCard icon="🗓" titre="Sur Carte M" desc="Cotisation, avance, pénalité" color={C.primary} onClick={()=>setClientPickerMode("cotM")}/>
      <MenuCard icon="📓" titre="Sur Carnet A" desc="Mise sur une page, retrait" color={C.gold} onClick={()=>setClientPickerMode("cotA")}/>
      <MenuCard icon="🏦" titre="Sur Épargne" desc="Dépôt ou retrait épargne" color={C.blue} onClick={()=>setClientPickerMode("epargne")}/>
      <MenuCard icon="💳" titre="Rem. Crédit Express" desc="Remboursement d'un crédit en cours" color={C.accent} onClick={()=>setClientPickerMode("creditRemb")}/>
    </div>;
  }

  // ── HOME ──
  const BigCard=({icon,titre,desc,onClick,color})=>(
    <div onClick={onClick} style={{background:`linear-gradient(135deg,${color},${color}cc)`,borderRadius:18,padding:24,marginBottom:16,cursor:"pointer",boxShadow:`0 4px 20px ${color}40`,color:"#fff"}}>
      <div style={{fontSize:36,marginBottom:8}}>{icon}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,marginBottom:4}}>{titre}</div>
      <div style={{fontSize:13,opacity:.85}}>{desc}</div>
    </div>
  );
  return<div style={{padding:"16px 14px 80px"}}>
    <PT>Tontine</PT>
    <BigCard icon="🛒" titre="Vente" desc="Vendre une Carte M, un Carnet A ou un Carnet Épargne" color={C.primary} onClick={()=>setVue("venteMenu")}/>
    <BigCard icon="💰" titre="Cotisation" desc="Cotisation, mise, dépôt épargne, remboursement crédit" color={C.accent} onClick={()=>setVue("cotisationMenu")}/>
  </div>;
}

// ═══════════════════════════════════
// MODULE CRÉDIT
// ═══════════════════════════════════
function Credit({data,up,toast,setTab,navExtra,setNavExtra}){
  const[vue,setVue]=useState("liste");
  const[selId,setSelId]=useState(null);
  const[mdp,setMdp]=useState(null);
  const[editOp,setEditOp]=useState(null);
  const[form,setForm]=useState({});
  const[choixClient,setChoixClient]=useState(false);
  const[newClient,setNewClient]=useState(false);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const getCr=()=>data.credits.find(c=>c.id===selId);

  // Navigation depuis Tontine (Cotisation > Rem. Crédit Express) ou profil client
  useEffect(()=>{
    if(navExtra?.creditAction){
      const{type,clientId,creditId}=navExtra.creditAction;
      if(type==="remb"&&creditId){setSelId(creditId);setForm({});setVue("remb");}
      else if(type==="open"&&creditId){setSelId(creditId);setVue("detail");}
      else if(type==="new"&&clientId){sf("clientId",clientId);setNewClient(false);setChoixClient("form");}
      setNavExtra(null);
    }
  },[navExtra]);

  const creerCredit=()=>{
    if(!form.clientId||!form.montant||!form.duree)return toast("Client, montant et durée obligatoires","error");
    const mt=parseInt(form.montant);
    const dette=calcDetteTotale(form.clientId,data.cartes,data.credits);
    if(dette>0){
      setMdp({msg:`⚠ Ce client a déjà une dette de ${fmt(dette)}.\nNormalement pas de nouveau crédit tant que la dette n'est pas soldée.\nAutorisation requise pour continuer.`,
        onOk:()=>doCredit(mt)});
    }else doCredit(mt);
  };

  const doCredit=(mt)=>{
    const n={id:uid(),clientId:form.clientId,montantInitial:mt,restant:mt,
      taux:form.taux||"",duree:form.duree,echeance:form.echeance||"",
      avaliseur1:form.av1?{nom:form.av1Nom,prenom:form.av1Prenom,numero:form.av1Tel,profession:form.av1Prof,adresse:form.av1Adr}:null,
      avaliseur2:form.av2?{nom:form.av2Nom,prenom:form.av2Prenom,numero:form.av2Tel,profession:form.av2Prof,adresse:form.av2Adr}:null,
      garantie:form.garantie||"",moyen:form.moyen||"Espèces",
      statut:"actif",remboursements:[],penalites:[],notes:form.notes||"",dateDebut:isoNow()};
    up(d=>{d.credits=[...d.credits,n];return d;});
    toast("Crédit de "+fmt(mt)+" accordé");setForm({});setChoixClient(false);setVue("liste");
  };

  const enregRemb=()=>{
    const cr=getCr();const mt=parseInt(form.montant);
    if(!mt||mt<=0)return toast("Montant invalide","error");
    if(mt>cr.restant)return toast("Dépasse le capital restant","error");
    up(d=>{
      const i=d.credits.findIndex(c=>c.id===selId);
      d.credits[i].restant=Math.max(0,d.credits[i].restant-mt);
      d.credits[i].remboursements=[...(d.credits[i].remboursements||[]),
        {id:uid(),montant:mt,interet:parseInt(form.interet)||0,date:isoNow(),moyen:form.moyen||"Espèces"}];
      if(d.credits[i].restant===0)d.credits[i].statut="soldé";
      return d;
    });
    toast("Remboursement de "+fmt(mt)+" enregistré");setForm({});setVue("detail");
  };

  const enregPen=()=>{
    const mt=parseInt(form.penalite);if(!mt||mt<=0)return toast("Montant invalide","error");
    up(d=>{
      const i=d.credits.findIndex(c=>c.id===selId);
      d.credits[i].penalites=[...(d.credits[i].penalites||[]),{id:uid(),montant:mt,date:isoNow()}];
      d.revenus.penalites=[...(d.revenus.penalites||[]),{id:uid(),type:"credit",montant:mt,clientId:getCr().clientId,date:isoNow()}];
      return d;
    });
    toast("Pénalité de "+fmt(mt)+" enregistrée");setForm({});setVue("detail");
  };

  const delPenCredit=(penId)=>{
    setMdp({msg:"Supprimer cette pénalité ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const i=d.credits.findIndex(c=>c.id===selId);
        const pen=d.credits[i].penalites.find(p=>p.id===penId);
        d.credits[i].penalites=(d.credits[i].penalites||[]).filter(p=>p.id!==penId);
        if(pen){
          // Retirer l'entrée correspondante du module Revenus (la plus proche dans le temps pour ce client)
          const cands=(d.revenus.penalites||[]).filter(p=>p.type==="credit"&&p.clientId===d.credits[i].clientId&&p.montant===pen.montant);
          if(cands.length){
            const toRemove=cands[cands.length-1];
            d.revenus.penalites=d.revenus.penalites.filter(p=>p.id!==toRemove.id);
          }
        }
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression pénalité crédit",details:fmt(pen?.montant||0),motif}];
        return d;
      });
      toast("Pénalité supprimée");
    }});
  };

  const saveEditPenCredit=({montant,date,motif})=>{
    up(d=>{
      const i=d.credits.findIndex(c=>c.id===selId);
      const pi=d.credits[i].penalites.findIndex(p=>p.id===editOp.id);
      if(pi===-1)return d;
      const pen=d.credits[i].penalites[pi];
      const ancien=pen.montant;
      // Mettre à jour aussi l'entrée correspondante dans revenus.penalites (recherche par ancien montant)
      const cands=(d.revenus.penalites||[]).filter(p=>p.type==="credit"&&p.clientId===d.credits[i].clientId&&p.montant===ancien);
      if(cands.length){
        const target=cands[cands.length-1];
        const ri=d.revenus.penalites.findIndex(p=>p.id===target.id);
        if(ri>-1){d.revenus.penalites[ri].montant=montant;d.revenus.penalites[ri].date=date;}
      }
      pen.montant=montant;pen.date=date;
      d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Modification pénalité crédit",details:`${fmt(ancien)} → ${fmt(montant)}`,motif}];
      return d;
    });
    toast("Pénalité modifiée");
  };

  const delRemb=(rId)=>{
    setMdp({msg:"Supprimer ce remboursement ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const i=d.credits.findIndex(c=>c.id===selId);
        const r=d.credits[i].remboursements.find(x=>x.id===rId);
        if(r){d.credits[i].restant+=r.montant;d.credits[i].statut="actif";
          d.credits[i].remboursements=d.credits[i].remboursements.filter(x=>x.id!==rId);
          d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression remboursement",details:fmt(r.montant),motif}];}
        return d;
      });
      toast("Remboursement supprimé");
    }});
  };

  const saveEditRemb=({montant,date,motif})=>{
    up(d=>{
      const i=d.credits.findIndex(c=>c.id===selId);
      const ri=d.credits[i].remboursements.findIndex(r=>r.id===editOp.id);
      if(ri===-1)return d;
      const r=d.credits[i].remboursements[ri];
      const ancien=r.montant;
      // Annuler l'ancien impact sur le restant, puis appliquer le nouveau montant
      d.credits[i].restant+=ancien;
      d.credits[i].restant-=montant;
      if(d.credits[i].restant<0)d.credits[i].restant=0;
      d.credits[i].statut=d.credits[i].restant<=0?"soldé":"actif";
      r.montant=montant;r.date=date;
      d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Modification remboursement",details:`${fmt(ancien)} → ${fmt(montant)}`,motif}];
      return d;
    });
    toast("Remboursement modifié");
  };

  const supprimerCredit=()=>{
    setMdp({msg:"Supprimer définitivement ce crédit (annulation de l'octroi) ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{
        const cr=d.credits.find(c=>c.id===selId);
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:"Suppression crédit",details:fmt(cr?.montantInitial||0),motif}];
        d.credits=d.credits.filter(c=>c.id!==selId);
        return d;
      });
      toast("Crédit supprimé");setVue("liste");
    }});
  };

  if(choixClient===true)return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>{setChoixClient(false);setNewClient(false);}}/><PT>Nouveau Crédit Express</PT>
    {!newClient?<ClientSelector data={data} onSelect={c=>{sf("clientId",c.id);setChoixClient("form");}} onNew={()=>setNewClient(true)}/>
      :<FormulaireClient data={data} up={up} toast={toast} onSave={c=>{sf("clientId",c.id);setNewClient(false);setChoixClient("form");}} onCancel={()=>setNewClient(false)}/>}
  </div>;

  if(choixClient==="form")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>{setChoixClient(true);setNewClient(false);}}/><PT>Nouveau Crédit Express</PT>
    {(()=>{const cli=data.clients.find(c=>c.id===form.clientId);return cli&&<MiniClient cli={cli} data={data}/>;})()}
    <Card>
      <Inp label="Montant (F) *" type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"/>
      <Inp label="Durée *" value={form.duree||""} onChange={e=>sf("duree",e.target.value)} placeholder="ex: 3 mois"/>
      <Inp label="Date d'échéance" type="date" value={form.echeance||""} onChange={e=>sf("echeance",e.target.value)}/>
      <Inp label="Taux d'intérêt (libre)" value={form.taux||""} onChange={e=>sf("taux",e.target.value)} placeholder="ex: 10%/mois"/>
      <HR/>
      <Inp label="Avaliseur 1 (nom + téléphone)" value={form.av1||""} onChange={e=>sf("av1",e.target.value)} placeholder="Nom + téléphone"/>
      <Inp label="Avaliseur 2 (nom + téléphone)" value={form.av2||""} onChange={e=>sf("av2",e.target.value)} placeholder="Nom + téléphone"/>
      <Inp label="Garantie (optionnel)" value={form.garantie||""} onChange={e=>sf("garantie",e.target.value)} placeholder="ex: téléphone, terrain..."/>
      <Sel label="Moyen de remboursement prévu" value={form.moyen||"Espèces"} onChange={e=>sf("moyen",e.target.value)}>
        <option>Espèces</option><option>Épargne</option><option>Mixx</option><option>Flooz</option><option>Compte bancaire</option>
      </Sel>
      <Inp label="Notes" value={form.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="..."/>
      <Btn v="acc" onClick={creerCredit}>Accorder le crédit</Btn>
    </Card>
    {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
  </div>;

  if(vue==="remb")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("detail")}/><PT>Remboursement</PT>
    {(()=>{const cr=getCr();return<Card>
      <Row label="Capital restant dû" value={fmt(cr?.restant)} color={C.red} bold/>
      {cr?.taux&&<Row label="Taux convenu" value={cr.taux}/>}
      <HR/>
      <Inp label="Montant remboursé (F) *" type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"/>
      <Inp label="Intérêt payé (F)" type="number" inputMode="numeric" value={form.interet||""} onChange={e=>sf("interet",e.target.value)} placeholder="0"/>
      <Sel label="Moyen" value={form.moyen||"Espèces"} onChange={e=>sf("moyen",e.target.value)}>
        <option>Espèces</option><option>Épargne</option><option>Mixx</option><option>Flooz</option><option>Compte bancaire</option>
      </Sel>
      <Btn onClick={enregRemb}>Enregistrer</Btn>
    </Card>;})()}
  </div>;

  if(vue==="penCredit")return<div style={{padding:"16px 14px 80px"}}>
    <Back onClick={()=>setVue("detail")}/><PT>Pénalité de retard</PT>
    <Card>
      <AlertBox msg="Pénalité applicable uniquement en cas de retard de remboursement." type="warn"/>
      <Inp label="Montant (F) *" type="number" inputMode="numeric" value={form.penalite||""} onChange={e=>sf("penalite",e.target.value)} placeholder="0"/>
      <Btn v="dan" onClick={enregPen}>Enregistrer</Btn>
    </Card>
  </div>;

  if(vue==="detail"&&selId){
    const cr=getCr();const cli=data.clients.find(c=>c.id===cr?.clientId);
    if(!cr)return<div style={{padding:20}}><Back onClick={()=>setVue("liste")}/>Introuvable</div>;
    const totalR=(cr.remboursements||[]).reduce((s,r)=>s+r.montant,0);
    const totalPen=(cr.penalites||[]).reduce((s,p)=>s+p.montant,0);
    const pct=Math.round((totalR/cr.montantInitial)*100);
    const echu=cr.echeance&&new Date(cr.echeance)<new Date()&&cr.statut==="actif";
    return<div style={{padding:"16px 14px 80px"}}>
      <Back onClick={()=>setVue("liste")}/><PT>Crédit Express</PT>
      {cli&&<MiniClient cli={cli} data={data}/>}
      {echu&&<AlertBox msg="⚠ Ce crédit est échu ! Pénalité applicable." type="error"/>}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Badge label={cr.statut==="actif"?"En cours":"✅ SOLDÉ"} color={cr.statut==="actif"?C.accent:C.green}/>
          <div style={{fontWeight:800,fontSize:24,color:cr.statut==="actif"?C.red:C.green,fontFamily:"'Playfair Display',serif"}}>{fmt(cr.restant)}</div>
        </div>
        <div style={{height:7,background:C.border,borderRadius:4,marginBottom:12}}>
          <div style={{height:"100%",width:pct+"%",background:C.green,borderRadius:4}}/>
        </div>
        <Row label="Montant initial" value={fmt(cr.montantInitial)}/>
        <Row label="Total remboursé" value={fmt(totalR)} color={C.green}/>
        <Row label="Taux d'intérêt" value={cr.taux||"—"}/>
        <Row label="Durée" value={cr.duree}/>
        {cr.echeance&&<Row label="Échéance" value={cr.echeance}/>}
        {cr.garantie&&<Row label="Garantie" value={cr.garantie}/>}
        {cr.avaliseur1&&<Row label="Avaliseur 1" value={`${cr.avaliseur1.nom||""} ${cr.avaliseur1.prenom||""} ${cr.avaliseur1.numero||""}`}/>}
        {cr.avaliseur2&&<Row label="Avaliseur 2" value={`${cr.avaliseur2.nom||""} ${cr.avaliseur2.prenom||""} ${cr.avaliseur2.numero||""}`}/>}
        {totalPen>0&&<Row label="🔴 Pénalités" value={fmt(totalPen)} color={C.red}/>}
        {cr.notes&&<Row label="Notes" value={cr.notes}/>}
        <Row label="Date" value={fmtDate(cr.dateDebut)}/>
      </Card>
      {cr.statut==="actif"&&<>
        <Btn onClick={()=>setVue("remb")}>Enregistrer un remboursement</Btn>
        <Btn v="dan" onClick={()=>setVue("penCredit")}>Enregistrer une pénalité</Btn>
      </>}
      <ST>Remboursements</ST>
      {(cr.remboursements||[]).slice().reverse().map(r=><div key={r.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:600,fontSize:13}}>{fmtDate(r.date)}</div>
          <div style={{fontSize:11,color:C.textL}}>{r.moyen}{r.interet>0?` · Intérêt: ${fmt(r.interet)}`:""}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontWeight:700,color:C.green}}>{fmt(r.montant)}</span>
          <button onClick={()=>setEditOp({type:"remb",id:r.id,montant:r.montant,date:r.date})} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>✏️</button>
          <button onClick={()=>delRemb(r.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
        </div>
      </div>)}
      {(cr.remboursements||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:16,fontSize:13}}>Aucun remboursement</div>}
      {(cr.penalites||[]).length>0&&<>
        <ST>Pénalités</ST>
        {cr.penalites.slice().reverse().map(p=><div key={p.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:12,color:C.textM}}>{fmtDate(p.date)}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:700,color:C.red}}>{fmt(p.montant)}</span>
            <button onClick={()=>setEditOp({type:"penCredit",id:p.id,montant:p.montant,date:p.date})} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>✏️</button>
            <button onClick={()=>delPenCredit(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
          </div>
        </div>)}
      </>}
      <HR/>
      <Btn v="dan" onClick={supprimerCredit}>🗑 Supprimer ce crédit</Btn>
      {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
      {editOp&&editOp.type==="remb"&&<EditOpModal titre="Remboursement" montant={editOp.montant} date={editOp.date} avecNote={false}
        onSave={saveEditRemb} onClose={()=>setEditOp(null)}/>}
      {editOp&&editOp.type==="penCredit"&&<EditOpModal titre="Pénalité crédit" montant={editOp.montant} date={editOp.date} avecNote={false}
        onSave={saveEditPenCredit} onClose={()=>setEditOp(null)}/>}
    </div>;
  }

  const actifs=data.credits.filter(c=>c.statut==="actif");
  const soldes=data.credits.filter(c=>c.statut==="soldé");
  return<div style={{padding:"16px 14px 80px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <PT s={{margin:0}}>Crédit Express ({data.credits.length})</PT>
      <Btn v="acc" onClick={()=>{setChoixClient(true);setNewClient(false);setForm({});}} s={{width:"auto",marginBottom:0,padding:"9px 16px",fontSize:13}}>+ Crédit</Btn>
    </div>
    {actifs.length>0&&<><ST>En cours ({actifs.length})</ST>
      {actifs.map(cr=>{const cli=data.clients.find(c=>c.id===cr.clientId);const echu=cr.echeance&&new Date(cr.echeance)<new Date();
        return<div key={cr.id} onClick={()=>{setSelId(cr.id);setVue("detail");}} style={{background:C.surface,border:`1px solid ${echu?C.red+"60":C.accent+"50"}`,borderRadius:14,padding:"13px 16px",marginBottom:10,cursor:"pointer",boxShadow:`0 1px 6px ${C.shadow}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,fontSize:14}}>{cli?.nom} {cli?.prenom}</div>
              <div style={{fontSize:11,color:C.textL}}>{cr.duree}{cr.echeance?` · Éch: ${cr.echeance}`:""}</div>
              {echu&&<div style={{fontSize:11,color:C.red}}>⚠ Échu</div>}</div>
            <div style={{fontWeight:800,color:C.red,fontSize:16,fontFamily:"'Playfair Display',serif"}}>{fmt(cr.restant)}</div>
          </div>
        </div>;})}
    </>}
    {soldes.length>0&&<><ST>Soldés ({soldes.length})</ST>
      {soldes.map(cr=>{const cli=data.clients.find(c=>c.id===cr.clientId);
        return<div key={cr.id} onClick={()=>{setSelId(cr.id);setVue("detail");}} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",marginBottom:8,cursor:"pointer",opacity:.7}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div style={{fontWeight:600,fontSize:13}}>{cli?.nom} {cli?.prenom}</div>
              <div style={{fontSize:11,color:C.textL}}>{cr.dateDebut?.slice(0,10)}</div></div>
            <Badge label="✅ SOLDÉ" color={C.green}/>
          </div>
        </div>;})}
    </>}
    {data.credits.length===0&&<div style={{textAlign:"center",color:C.textL,padding:40,fontSize:14}}>Aucun crédit enregistré</div>}
  </div>;
}

// MODULE REVENUS
// ═══════════════════════════════════
function Revenus({data,up,toast}){
  const[onglet,setOnglet]=useState("resume");
  const[form,setForm]=useState({});
  const[mdp,setMdp]=useState(null);
  const[filtre,setFiltre]=useState("jour");
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const rev=data.revenus;const now=new Date();const today=isoDate();

  const filtrer=arr=>{if(!arr)return[];
    return arr.filter(o=>{if(!o.date)return false;const d=new Date(o.date);
      if(filtre==="jour")return o.date.slice(0,10)===today;
      if(filtre==="semaine"){const db=new Date(now);db.setDate(db.getDate()-7);return d>=db;}
      if(filtre==="mois")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      if(filtre==="annee")return d.getFullYear()===now.getFullYear();
      return true;});};

  const tC=filtrer(rev.commissions).reduce((s,o)=>s+(o.montant||0),0);
  const tV=filtrer(rev.ventes).reduce((s,o)=>s+(o.montant||0),0);
  const tP=filtrer(rev.penalites).reduce((s,o)=>s+(o.montant||0),0);
  const tMM=filtrer(rev.mm||[]).reduce((s,o)=>s+(o.montant||0),0);
  const tMN=filtrer(rev.monnaie||[]).reduce((s,o)=>s+(o.montant||0),0);
  const tG=tC+tV+tP+tMM+tMN;

  const enregMM=()=>{
    const mt=parseInt(form.montant);if(!mt||mt<=0)return toast("Montant invalide","error");
    if(!form.type)return toast("Choisissez Mixx ou Flooz","error");
    up(d=>{d.revenus.mm=[...(d.revenus.mm||[]),{id:uid(),type:form.type,montant:mt,date:isoNow(),note:form.note||""}];return d;});
    toast("Commission "+form.type+" de "+fmt(mt)+" enregistrée");setForm({});
  };
  const enregMN=()=>{
    const mt=parseInt(form.montantMN);if(!mt||mt<=0)return toast("Montant invalide","error");
    up(d=>{d.revenus.monnaie=[...(d.revenus.monnaie||[]),{id:uid(),montant:mt,date:isoNow(),note:form.noteMN||""}];return d;});
    toast("Commission monnaie de "+fmt(mt)+" enregistrée");setForm({});
  };
  const delOp=(cat,id)=>{
    setMdp({msg:"Supprimer cette opération ?",avecMotif:true,onOk:(motif)=>{
      up(d=>{d.revenus[cat]=d.revenus[cat].filter(o=>o.id!==id);
        d.audit=[...(d.audit||[]),{id:uid(),date:isoNow(),auteur:"Patron",action:`Suppression ${cat}`,details:"",motif}];
        return d;});
      toast("Supprimé");
    }});
  };

  const FILTRES=[{k:"jour",l:"Aujourd'hui"},{k:"semaine",l:"7 jours"},{k:"mois",l:"Ce mois"},{k:"annee",l:"Cette année"},{k:"tout",l:"Tout"}];
  const ONGLETS=[{k:"resume",l:"Résumé"},{k:"mm",l:"M-Money"},{k:"monnaie",l:"Monnaie"},{k:"commissions",l:"Commissions"},{k:"ventes",l:"Ventes"},{k:"penalites",l:"Pénalités"},{k:"audit",l:"Journal"}];

  return<div style={{padding:"16px 14px 80px"}}>
    <PT>Revenus ALODO</PT>
    <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
      {FILTRES.map(f=><button key={f.k} onClick={()=>setFiltre(f.k)} style={{background:filtre===f.k?C.primary:C.surface,color:filtre===f.k?"#fff":C.textM,border:`1px solid ${filtre===f.k?C.primary:C.border}`,borderRadius:20,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{f.l}</button>)}
    </div>
    <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
      {ONGLETS.map(o=><button key={o.k} onClick={()=>setOnglet(o.k)} style={{background:onglet===o.k?C.accent:C.surface,color:onglet===o.k?"#fff":C.textM,border:`1px solid ${onglet===o.k?C.accent:C.border}`,borderRadius:20,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{o.l}</button>)}
    </div>

    {onglet==="resume"&&<>
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,borderRadius:16,padding:20,marginBottom:16,color:"#fff"}}>
        <div style={{fontSize:12,opacity:.7,marginBottom:4}}>Total · {FILTRES.find(f=>f.k===filtre)?.l}</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:800}}>{fmt(tG)}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{l:"Commissions",v:fmt(tC),c:C.gold,i:"💰"},{l:"Ventes",v:fmt(tV),c:C.blue,i:"🛒"},
          {l:"Pénalités",v:fmt(tP),c:C.red,i:"⚠️"},{l:"Mobile Money",v:fmt(tMM),c:C.green,i:"📱"},{l:"Monnaie",v:fmt(tMN),c:C.purple,i:"💱"}]
          .map((s,i)=><div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.i}</div>
            <div style={{fontSize:10,color:C.textL,marginBottom:3}}>{s.l}</div>
            <div style={{fontWeight:800,fontSize:15,color:s.c,fontFamily:"'Playfair Display',serif"}}>{s.v}</div>
          </div>)}
      </div>
    </>}

    {onglet==="mm"&&<>
      <Card>
        <div style={{fontWeight:700,color:C.primary,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>Nouvelle commission MM</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {["Mixx","Flooz"].map(t=><button key={t} onClick={()=>sf("type",t)} style={{background:form.type===t?C.primary:C.card,color:form.type===t?"#fff":C.text,border:`1.5px solid ${form.type===t?C.primary:C.border}`,borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer"}}>{t}</button>)}
        </div>
        <div style={{fontSize:12,color:C.textM,marginBottom:12}}>📅 {fmtDate()}</div>
        <Inp label="Montant (F) *" type="number" inputMode="numeric" value={form.montant||""} onChange={e=>sf("montant",e.target.value)} placeholder="0"/>
        <Inp label="Note" value={form.note||""} onChange={e=>sf("note",e.target.value)} placeholder="..."/>
        <Btn onClick={enregMM}>Enregistrer</Btn>
      </Card>
      <ST>Historique</ST>
      {filtrer(rev.mm||[]).slice().reverse().map(op=><div key={op.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><Badge label={op.type} color={op.type==="Mixx"?C.blue:C.gold}/>
          <div style={{fontSize:11,color:C.textL,marginTop:4}}>{fmtDate(op.date)}{op.note?" · "+op.note:""}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontWeight:700,color:C.green}}>{fmt(op.montant)}</span>
          <button onClick={()=>delOp("mm",op.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
        </div>
      </div>)}
      {filtrer(rev.mm||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune opération</div>}
    </>}

    {onglet==="monnaie"&&<>
      <Card>
        <div style={{fontWeight:700,color:C.primary,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>Nouvelle commission Monnaie</div>
        <div style={{fontSize:12,color:C.textM,marginBottom:12}}>📅 {fmtDate()}</div>
        <Inp label="Montant (F) *" type="number" inputMode="numeric" value={form.montantMN||""} onChange={e=>sf("montantMN",e.target.value)} placeholder="0"/>
        <Inp label="Note" value={form.noteMN||""} onChange={e=>sf("noteMN",e.target.value)} placeholder="..."/>
        <Btn onClick={enregMN}>Enregistrer</Btn>
      </Card>
      <ST>Historique</ST>
      {filtrer(rev.monnaie||[]).slice().reverse().map(op=><div key={op.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:600,fontSize:13}}>{fmtDate(op.date)}</div>{op.note&&<div style={{fontSize:11,color:C.textL}}>{op.note}</div>}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontWeight:700,color:C.green}}>{fmt(op.montant)}</span>
          <button onClick={()=>delOp("monnaie",op.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.textL,padding:4}}>🗑</button>
        </div>
      </div>)}
      {filtrer(rev.monnaie||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune opération</div>}
    </>}

    {onglet==="commissions"&&<>
      <div style={{background:C.gold+"20",borderRadius:12,padding:14,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.textL}}>Total commissions</div>
        <div style={{fontWeight:800,fontSize:22,color:C.gold,fontFamily:"'Playfair Display',serif"}}>{fmt(tC)}</div>
      </div>
      {filtrer(rev.commissions||[]).slice().reverse().map(op=>{const cli=data.clients.find(c=>c.id===op.clientId);
        return<div key={op.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><Badge label={op.type==="carteM"?"Carte M":"Carnet A"} color={op.type==="carteM"?C.blue:C.gold}/>
              <div style={{fontSize:12,color:C.textM,marginTop:4}}>{cli?.nom} {cli?.prenom}</div>
              <div style={{fontSize:11,color:C.textL}}>{fmtDate(op.date)}</div></div>
            <span style={{fontWeight:700,color:C.gold}}>{fmt(op.montant)}</span>
          </div>
        </div>;})}
      {filtrer(rev.commissions||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune commission</div>}
    </>}

    {onglet==="ventes"&&<>
      <div style={{background:C.blue+"15",borderRadius:12,padding:14,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.textL}}>Total ventes</div>
        <div style={{fontWeight:800,fontSize:22,color:C.blue,fontFamily:"'Playfair Display',serif"}}>{fmt(tV)}</div>
      </div>
      {filtrer(rev.ventes||[]).slice().reverse().map(op=>{
        const cli=data.clients.find(c=>c.id===op.clientId);
        // Trouver le numéro de la carte/carnet
        const num=op.type==="carteM"?data.cartes.find(c=>c.id===op.carteId)?.numero||"—"
          :op.type==="carnetA"?data.carnets.find(c=>c.id===op.carnetId)?.numero||"—"
          :(data.carnetsEpargne||[]).find(c=>c.id===op.carnetEId)?.numero||"—";
        const typeLabel=op.type==="carteM"?"Carte M":op.type==="carnetA"?"Carnet A":"Carnet Épargne";
        const typeColor=op.type==="carteM"?C.blue:op.type==="carnetA"?C.gold:C.purple;
        return<div key={op.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                <Badge label={op.typeVente==="cp"?"CP":"Normale"} color={op.typeVente==="cp"?C.red:C.green}/>
                <Badge label={typeLabel} color={typeColor}/>
              </div>
              <div style={{fontWeight:700,fontSize:14,color:C.primary,marginBottom:2}}>{cli?.nom} {cli?.prenom}</div>
              {num!=="—"&&<div style={{fontSize:12,color:C.textM,marginBottom:2}}>N° : {num}</div>}
              <div style={{fontSize:12,color:C.textL}}>{fmtDate(op.date)}</div>
            </div>
            <div style={{fontWeight:800,color:C.blue,fontSize:16,fontFamily:"'Playfair Display',serif",flexShrink:0}}>{fmt(op.montant)}</div>
          </div>
        </div>;})}
      {filtrer(rev.ventes||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune vente</div>}
    </>}

    {onglet==="penalites"&&<>
      <div style={{background:C.red+"15",borderRadius:12,padding:14,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.textL}}>Total pénalités</div>
        <div style={{fontWeight:800,fontSize:22,color:C.red,fontFamily:"'Playfair Display',serif"}}>{fmt(tP)}</div>
      </div>
      {filtrer(rev.penalites||[]).slice().reverse().map(op=>{const cli=data.clients.find(c=>c.id===op.clientId);
        return<div key={op.id} style={{background:C.surface,border:`1px solid ${C.red}30`,borderRadius:10,padding:"10px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><Badge label={op.type==="carteM"?"Carte M":"Crédit"} color={op.type==="carteM"?C.accent:C.red}/>
              <div style={{fontSize:12,color:C.textM,marginTop:4}}>{cli?.nom} {cli?.prenom}</div>
              <div style={{fontSize:11,color:C.textL}}>{fmtDate(op.date)}</div></div>
            <span style={{fontWeight:700,color:C.red}}>{fmt(op.montant)}</span>
          </div>
        </div>;})}
      {filtrer(rev.penalites||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune pénalité</div>}
    </>}

    {onglet==="audit"&&<>
      <ST>Journal d'audit</ST>
      {(data.audit||[]).slice().reverse().map(a=><div key={a.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,color:C.primary}}>{a.action}</div>
            <div style={{fontSize:11,color:C.textL}}>{fmtDate(a.date)} · {a.auteur}</div>
            {a.details&&<div style={{fontSize:11,color:C.textM,marginTop:2}}>{a.details}</div>}
            {a.motif&&<div style={{fontSize:11,color:C.accent,marginTop:2}}>Motif : {a.motif}</div>}
          </div>
        </div>
      </div>)}
      {(data.audit||[]).length===0&&<div style={{textAlign:"center",color:C.textL,padding:20,fontSize:13}}>Aucune entrée dans le journal</div>}
    </>}

    {mdp&&<MdpModal {...mdp} onClose={()=>setMdp(null)}/>}
  </div>;
}

// ═══════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════
function ExportImport({data,up,toast,onClose}){
  const exporter=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download=`ALODO_v4_backup_${isoDate()}.json`;a.click();
    URL.revokeObjectURL(url);toast("Données exportées !");onClose();
  };
  const importer=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const imp=JSON.parse(ev.target.result);up(()=>({...initData(),...imp}));toast("Données importées !");onClose();}
      catch{toast("Fichier invalide","error");}
    };
    reader.readAsText(file);
  };
  return<Modal title="💾 Sauvegarde des données" onClose={onClose}>
    <AlertBox msg="Exportez régulièrement vos données pour éviter toute perte." type="info"/>
    <Btn v="green" onClick={exporter}>📤 Exporter mes données (JSON)</Btn>
    <HR/>
    <label style={{display:"block",background:C.primary,color:"#fff",borderRadius:12,padding:"13px 20px",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"center",marginBottom:8}}>
      📥 Importer une sauvegarde
      <input type="file" accept=".json" onChange={importer} style={{display:"none"}}/>
    </label>
    <AlertBox msg="⚠ L'importation remplacera toutes vos données actuelles." type="warn"/>
    <Btn v="ghost" onClick={onClose}>Fermer</Btn>
  </Modal>;
}

// ═══════════════════════════════════
// APPLICATION PRINCIPALE
// ═══════════════════════════════════
const TABS=[
  {k:"dashboard",l:"Accueil",i:"⊞"},
  {k:"clients",l:"Clients",i:"👥"},
  {k:"tontine",l:"Tontine",i:"🗓"},
  {k:"credit",l:"Crédit",i:"💳"},
  {k:"revenus",l:"Revenus",i:"💰"},
];

function App(){
  const[role,setRole]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[data,up]=useData();
  const[toast,setToast]=useState(null);
  const[navExtra,setNavExtra]=useState(null);
  const[showSave,setShowSave]=useState(false);
  const showToast=useCallback((msg,type="success")=>setToast({msg,type}),[]);
  if(!role)return<Login onLogin={r=>setRole(r)}/>;
  const props={data,up,toast:showToast,role,setTab,navExtra,setNavExtra};
  const pages={
    dashboard:<Dashboard {...props}/>,
    clients:<Clients {...props}/>,
    tontine:<Tontine {...props}/>,
    credit:<Credit {...props}/>,
    revenus:role==="patron"?<Revenus {...props}/>:<div style={{padding:40,textAlign:"center",color:C.textL,fontSize:14}}>⛔ Accès non autorisé</div>,
  };
  const tabsOk=TABS.filter(t=>role==="patron"||["dashboard","clients","tontine"].includes(t.k));
  return<div style={{background:C.bg,height:"100vh",maxWidth:500,margin:"0 auto",display:"flex",flexDirection:"column",color:C.text,overflow:"hidden"}}>
    <style>{`input:focus,select:focus{border-color:#1B4332 !important;outline:none;} button:active{opacity:.8;transform:scale(.98);} input[type=number]{-moz-appearance:textfield;}`}</style>
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    {/* Header */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"10px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,color:C.primary}}>🏦 ALODO</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <Badge label={role==="patron"?"Patron":"Employé"} color={role==="patron"?C.primary:C.blue}/>
        {role==="patron"&&<button onClick={()=>setShowSave(true)} style={{background:C.green+"20",color:C.green,border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>💾</button>}
        <button onClick={()=>setRole(null)} style={{background:C.red+"15",color:C.red,border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>⏻</button>
      </div>
    </div>
    {/* Contenu */}
    <div style={{flex:1,overflowY:"auto"}}>{pages[tab]}</div>
    {/* Navigation */}
    <div style={{background:C.surface,borderTop:`2px solid ${C.border}`,display:"flex",padding:"8px 0 20px",boxShadow:"0 -4px 20px rgba(0,0,0,0.1)",flexShrink:0,zIndex:50}}>
      {tabsOk.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 2px"}}>
        <span style={{fontSize:22,opacity:tab===t.k?1:0.4}}>{t.i}</span>
        <span style={{fontSize:11,fontWeight:tab===t.k?700:500,color:tab===t.k?C.primary:C.textL,letterSpacing:"0.02em"}}>{t.l}</span>
        {tab===t.k&&<div style={{width:22,height:3,background:C.primary,borderRadius:2,marginTop:1}}/>}
      </button>)}
    </div>
    {showSave&&<ExportImport data={data} up={up} toast={showToast} onClose={()=>setShowSave(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
